let audioCtx=null,masterSFXGain=null,masterMusicGain=null;

function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterSFXGain=audioCtx.createGain();masterMusicGain=audioCtx.createGain();
    masterSFXGain.connect(audioCtx.destination);masterMusicGain.connect(audioCtx.destination);
    masterSFXGain.gain.value=settingSfxVol/10; masterMusicGain.gain.value=settingMusicVol/10;
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function playSound(type){
  if(!audioCtx)return; const now=audioCtx.currentTime;
  const mkOG=(oscType,freq,vol,dur,freqEnd)=>{
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.connect(g);g.connect(masterSFXGain);osc.type=oscType;
    osc.frequency.setValueAtTime(freq,now);
    if(freqEnd)osc.frequency.exponentialRampToValueAtTime(freqEnd,now+dur);
    g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+dur);
    osc.start(now);osc.stop(now+dur);
  };
  if(type==='hover')mkOG('sine',1000,0.05,0.04,600);
  else if(type==='click')mkOG('square',500,0.1,0.08,200);
  else if(type==='shoot_handgun')mkOG('square',380,0.25,0.12,80);
  else if(type==='shoot_minigun')mkOG('sawtooth',200+Math.random()*60,0.18,0.1,30);
  else if(type==='shoot_shotgun'){for(let i=0;i<3;i++)setTimeout(()=>{if(audioCtx)mkOG('square',150+Math.random()*80,0.2,0.12,20);},i*10);}
  else if(type==='hit')mkOG('square',90,0.35,0.1,18);
  else if(type==='hitmarker'){mkOG('sawtooth',320,0.4,0.06,40);mkOG('square',1200,0.15,0.04,200);}
  else if(type==='reload')mkOG('triangle',180,0.12,0.35,320);
  else if(type==='switch')mkOG('sine',700,0.1,0.1,900);
  else if(type==='shovel')mkOG('triangle',220,0.6,0.12,80);
  else if(type==='grenade_bounce')mkOG('triangle',130,0.12,0.1,60);
  else if(type==='spawn')mkOG('square',300,0.2,0.4,600);
  else if(type==='explosion_bam'){
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.connect(g);g.connect(masterSFXGain);osc.type='square';
    osc.frequency.setValueAtTime(60,now);osc.frequency.exponentialRampToValueAtTime(5,now+0.8);
    g.gain.setValueAtTime(1.5,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.8);
    osc.start(now);osc.stop(now+0.8);
  }
  else if(type==='explosion_puff')mkOG('sine',60,0.5,0.3,15);
  else if(type==='sticky_beep')mkOG('square',1100,0.2,0.05,700);
  else if(type==='ding'){
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.connect(g);g.connect(masterSFXGain);osc.type='sine';
    osc.frequency.setValueAtTime(800,now);
    g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
    osc.start(now);osc.stop(now+0.3);
  }
}

  }, 300);
}

function gpIs(gp,action){
  if(!gp||!gp.connected)return false;
  const b=(i)=>gp.buttons.length>i&&gp.buttons[i].pressed;
  const ax=(i)=>gp.axes.length>i?gp.axes[i]:0;
  const hat = gp.axes.length > 9 ? gp.axes[9] : 999;
  
  switch(action){
    case 'UP':return b(12) || ax(1) < -0.4 || hat === -1 || (hat > -1.1 && hat < -0.9);
    case 'DOWN':return b(13) || ax(1) > 0.4 || hat === 0.1428571492433548 || (hat > 0.1 && hat < 0.2);
    case 'LEFT':return b(14) || ax(0) < -0.4 || hat === 0.7142857313156128 || (hat > 0.7 && hat < 0.8);
    case 'RIGHT':return b(15) || ax(0) > 0.4 || hat === -0.4285714030265808 || (hat > -0.5 && hat < -0.4);
    case 'SELECT':return b(0); 
    case 'BACK':return b(1); 
    case 'TRIANGLE':return b(3); 
    case 'SQUARE': return b(2); 
    case 'START': return b(9) || b(10); 
  }
  return false;
}

function getLocalInput() {
  let kLeft=false, kRight=false, kJump=false, kShoot=false, kReload=false, kSwapNext=false, kSwapPrev=false;
  let aimAngle=0, aimActive=false;

  kLeft=keys.ArrowLeft; kRight=keys.ArrowRight; kJump=keys.ArrowUp; kShoot=keys.Enter; 
  kReload=keys.KeyR; kSwapNext=keys.KeyE; kSwapPrev=keys.KeyQ; 
  
  const gamepads=navigator.getGamepads?navigator.getGamepads():[];
  for(let i=0; i<gamepads.length; i++) {
      const gp = gamepads[i]; if(!gp || !gp.connected) continue;
      if(gpIs(gp,'SELECT')) kJump=true;
      if(gpBtn(gp,7)) kShoot=true; 
      if(gpIs(gp,'TRIANGLE')) kReload=true;
      if(gpBtn(gp,6)) kSwapNext=true; // L2
      if(gpBtn(gp,4)) kSwapPrev=true; // L1
      
      let ax = gpAx(gp,0), ay = gpAx(gp,1);
      if(Math.abs(ax)>0.2) { if(ax<0)kLeft=true; else kRight=true; }
      let rx = gpAx(gp,2), ry = gpAx(gp,3);
      if(Math.abs(rx)>0.2 || Math.abs(ry)>0.2) {
          aimAngle = Math.atan2(ry, rx);
          aimActive = true;
      }
  }
  return { left: kLeft, right: kRight, jump: kJump, shoot: kShoot, reload: kReload, swapN: kSwapNext, swapP: kSwapPrev, aimAngle, aimActive };
}

    let el = uiElements[uiIndex];
    if(el) el.classList.add('active');
    
    if(select && el) {
        playSound('click');
        if(el.tagName === 'INPUT') el.focus();
        else el.click();
    }
    
    if(back) {
        playSound('click');
        document.getElementById('hostUI').style.display = 'none';
        document.getElementById('joinUI').style.display = 'none';
        uiMode = 'NONE'; gameState = STATE_MP_MENU;
    }
}

function setupFirebasePresence() {
    if(!isFirebaseReady) return;
    const amOnline = db.ref('.info/connected');
    const userRef = db.ref('presence/' + Math.random().toString(36).substring(2));
    amOnline.on('value', snap => {
        if(snap.val()) { 
            userRef.onDisconnect().remove(); userRef.set(true); 
            let start = Date.now();
            db.ref('.info/serverTimeOffset').once('value').then(() => { latencyPing = Date.now() - start; });
        }
    });
    db.ref('presence').on('value', snap => { onlineCount = snap.numChildren(); });
}
setupFirebasePresence();

function createLobby(name, kills) {
    if(!isFirebaseReady) { alert("Firebase puuttuu!"); return; }
    currentLobbyId = db.ref('lobbies').push().key;
    isHost = true; myPlayerId = 0; lobbyKillsToWin = kills;
    RNG_SEED = Math.floor(Math.random() * 1000000);
    hasP2Joined = false; amIReady = false;
    
    db.ref('lobbies/' + currentLobbyId).set({
        name: name, killsToWin: kills, mapSeed: RNG_SEED, state: 'waiting', ping: latencyPing,
        p1: { ready: false }, p2: null, left: false
    });
    
    // Kuunnellaan Lobbyn muutoksia
    db.ref('lobbies/' + currentLobbyId).on('value', snap => {
        currentLobbyData = snap.val();
        if(!currentLobbyData) return;
        
        // DING ääni, kun P2 liittyy
        if(!hasP2Joined && currentLobbyData.p2) {
            hasP2Joined = true;
            playSound('ding');
        }

        // Hostin tehtävä on käynnistää peli, kun MOLEMMAT ovat valmiita
        if(isHost && currentLobbyData.state === 'waiting' && currentLobbyData.p1 && currentLobbyData.p1.ready && currentLobbyData.p2 && currentLobbyData.p2.ready) {
            db.ref('lobbies/' + currentLobbyId + '/state').set('loading');
        }

        if(currentLobbyData.state === 'loading' && gameState === STATE_LOBBY_WAIT) {
            startFadeToGame(true);
        }
        
        // Pelaaja poistui
        if(currentLobbyData.left === true && (gameState === STATE_PLAYING || gameState === STATE_LOBBY_WAIT)) disconnectGame();
    });

    gameState = STATE_LOBBY_WAIT; uiMode = 'NONE';
    document.getElementById('hostUI').style.display = 'none';
}

function joinLobby(lobbyId) {
    if(!isFirebaseReady) return;
    currentLobbyId = lobbyId; isHost = false; myPlayerId = 1; amIReady = false;
    
    db.ref('lobbies/' + currentLobbyId).once('value', snap => {
        const data = snap.val();
        if(data && data.state === 'waiting') {
            lobbyKillsToWin = data.killsToWin;
            RNG_SEED = data.mapSeed;
            db.ref('lobbies/' + currentLobbyId + '/p2').set({ready: false});
            
            db.ref('lobbies/' + currentLobbyId).on('value', snap => {
                currentLobbyData = snap.val();
                if(!currentLobbyData) return;
                
                if(currentLobbyData.state === 'loading' && gameState === STATE_LOBBY_WAIT) {
                    startFadeToGame(true);
                }
                if(currentLobbyData.left === true && (gameState === STATE_PLAYING || gameState === STATE_LOBBY_WAIT)) disconnectGame();
            });

            uiMode = 'NONE'; document.getElementById('joinUI').style.display = 'none';
            gameState = STATE_LOBBY_WAIT;
        } else {
            alert("Lobby on täynnä tai poistettu!");
            document.getElementById('joinUI').style.display = 'none';
            uiMode = 'NONE'; gameState = STATE_MENU;
        }
    });
}

function fetchLobbies() {
    if(!isFirebaseReady) return;
    db.ref('lobbies').once('value', snap => {
        const list = document.getElementById('joinList');
        list.innerHTML = "";
        const lobbies = snap.val();
        if(lobbies) {

    });

function listenToEvents() {
    if(!isFirebaseReady || !currentLobbyId) return;
    db.ref('lobbies/' + currentLobbyId + '/events').on('child_added', snap => {
        const ev = snap.val();
        if(ev.pid !== myPlayerId) {
            let p = players[ev.pid];
            if(p) {
                if(ev.type === 'shoot') {
                    playSound(ev.w===W_SHOTGUN?'shoot_shotgun':(ev.w===W_MINIGUN?'shoot_minigun':(ev.w===W_BAZOOKA?'explosion_puff':'shoot_handgun')));
                    if(ev.w === W_MINIGUN) bullets.push(new Bullet(ev.x, ev.y, ev.dirX*9, ev.dirY*9, ev.pid, ev.w));
                    else if(ev.w === W_SHOTGUN) {
                        for(let i=0; i<8; i++) bullets.push(new Bullet(ev.x, ev.y, ev.dirX*10, ev.dirY*10, ev.pid, ev.w)); 
                    }
                    else if(ev.w === W_BAZOOKA) bullets.push(new Bullet(ev.x, ev.y, ev.dirX*6, ev.dirY*6, ev.pid, ev.w));
                    else if(ev.w === W_GRENADE || ev.w === W_DYNAMITE) grenades.push(new Grenade(ev.x, ev.y, ev.dirX*7, ev.dirY*7, ev.pid, ev.w));
                }
                else if(ev.type === 'shovel') {
                    playSound('shovel');
                    jaggedCarve(ev.x, ev.y, 15, true); renderFullTerrainCanvas();
                }
            }
        }
    });

    db.ref('lobbies/' + currentLobbyId + '/ping/' + (isHost?1:0)).on('value', snap => {
        if(snap.val()) db.ref('lobbies/' + currentLobbyId + '/pong/' + myPlayerId).set(snap.val());
    });
    db.ref('lobbies/' + currentLobbyId + '/pong/' + (isHost?1:0)).on('value', snap => {
        if(snap.val() && lastPingTime > 0) pingMs = Date.now() - lastPingTime;
    });
}

function syncMultiplayer() {
    if(!isFirebaseReady || !currentLobbyId || gameState !== STATE_PLAYING) return;
    
    let me = players[myPlayerId];
    db.ref('lobbies/' + currentLobbyId + '/p' + (myPlayerId+1)).update({
        x: Math.floor(me.x), y: Math.floor(me.y), aim: me.aimAngle, 
        fr: me.facingRight, w: me.weaponIndex, walk: me.isWalking, hp: me.hp, kills: me.kills
    });

    if(Date.now() - lastPingTime > 2000) {
        lastPingTime = Date.now();
        db.ref('lobbies/' + currentLobbyId + '/ping/' + myPlayerId).set(lastPingTime);
    }
}

function startListeningToRemote() {
    let remoteId = isHost ? 1 : 0;
    db.ref('lobbies/' + currentLobbyId + '/p' + (remoteId+1)).on('value', snap => {

        }
    });
}

function handleMenuInput(){
  const now=Date.now();
  let navUp=false,navDown=false,navLeft=false,navRight=false,select=false,back=false, fsPress=false;
  
  if(now-lastInputTime>150){
      if(keys.ArrowUp)navUp=true; if(keys.ArrowDown)navDown=true; 
      if(keys.ArrowLeft)navLeft=true; if(keys.ArrowRight)navRight=true;
  }
  if(now-lastInputTime>200){if(keys.Enter)select=true;if(keys.Escape)back=true;}
  
  const gamepads=navigator.getGamepads?navigator.getGamepads():[];
  for(let i=0;i<gamepads.length;i++){
    const gp=gamepads[i];if(!gp||!gp.connected)continue;
    if(now-lastInputTime>150){
        if(gpIs(gp,'UP'))navUp=true; if(gpIs(gp,'DOWN'))navDown=true;
        if(gpIs(gp,'LEFT'))navLeft=true; if(gpIs(gp,'RIGHT'))navRight=true;
    }
    if(now-lastInputTime>200){
      if(gpIs(gp,'SELECT'))select=true; 
      if(gpIs(gp,'BACK'))back=true;
      if(gpIs(gp,'SQUARE')) fsPress=true;
    }
  }

  if(fsPress) { toggleFullscreen(); playSound('click'); lastInputTime=now+200; }

  // Jos ollaan UI moodissa, käsittele DOM navigointi
  if(uiMode !== 'NONE') {
      if(navUp||navDown||navLeft||navRight||select||back) {
          handleUINav(navUp, navDown, navLeft, navRight, select, back);
          lastInputTime=now;
      }
      return;
  }

  let moved=false;
  
  if(gameState===STATE_MENU){
    let oldSel=mainMenuSel;
    if(navUp)mainMenuSel=wrap(mainMenuSel-1,mainMenuOptions.length);
    if(navDown)mainMenuSel=wrap(mainMenuSel+1,mainMenuOptions.length);
    if(oldSel!==mainMenuSel)moved=true;
    
    if(select){
      playSound('click');
      if(mainMenuSel===0){ gameState = STATE_MP_MENU; } 
      else if(mainMenuSel===1){ gameState = STATE_OPTIONS; }
      lastInputTime=now+100;
    }
  }
  else if(gameState===STATE_MP_MENU) {
    let oldSel=mpMenuSel;
    if(navUp)mpMenuSel=wrap(mpMenuSel-1,mpMenuOptions.length);
    if(navDown)mpMenuSel=wrap(mpMenuSel+1,mpMenuOptions.length);
    if(oldSel!==mpMenuSel)moved=true;
    
    if(select) {
        playSound('click');
        if(mpMenuSel===0) { document.getElementById('hostUI').style.display = 'flex'; setUIMode('HOST'); } 
        else if(mpMenuSel===1) { document.getElementById('joinUI').style.display = 'flex'; fetchLobbies(); setUIMode('JOIN'); }
        else if(mpMenuSel===2) { gameState = STATE_MENU; }
        lastInputTime=now+100;
    }
    if(back) { playSound('click'); gameState = STATE_MENU; lastInputTime=now+100; }
  }
  else if(gameState===STATE_OPTIONS){
    let oldSel=optionsMenuSel;
    if(navUp)optionsMenuSel=wrap(optionsMenuSel-1,gfxMenuOptions.length);
    if(navDown)optionsMenuSel=wrap(optionsMenuSel+1,gfxMenuOptions.length);
    if(oldSel!==optionsMenuSel)moved=true;
    
    if(select){
        playSound('click');
        if(optionsMenuSel===0) settingMusic = !settingMusic;
        if(optionsMenuSel===1) settingGore = !settingGore;
        if(optionsMenuSel===2) settingShadows = !settingShadows;
        if(optionsMenuSel===3) gameState=STATE_MENU;
        lastInputTime=now+100;
    }
    if(back){playSound('click');gameState=STATE_MENU; lastInputTime=now+100;}
  }
  else if(gameState===STATE_LOBBY_WAIT) {
      let toggleReady = false;
      if(keys.KeyR && now - lastInputTime > 250) toggleReady = true;
      for(let i=0; i<gamepads.length; i++) {
          const gp = gamepads[i]; if(!gp || !gp.connected) continue;
          if(gpIs(gp, 'TRIANGLE') && now - lastInputTime > 250) toggleReady = true;
      }

      if(toggleReady && currentLobbyId && currentLobbyData) {
          playSound('click');
          amIReady = !amIReady;
          db.ref('lobbies/' + currentLobbyId + '/p' + (myPlayerId+1)).update({ready: amIReady});
          lastInputTime = now;
      }
      
      if(back) {
         leaveGame();
         lastInputTime = now;
      }
  }
  else if(gameState===STATE_PAUSED) {
      let oldSel=pauseMenuSel;
      if(navUp)pauseMenuSel=wrap(pauseMenuSel-1,pauseMenuOptions.length);
      if(navDown)pauseMenuSel=wrap(pauseMenuSel+1,pauseMenuOptions.length);
      if(oldSel!==pauseMenuSel)moved=true;
      
      if(select) {
          playSound('click');
          if(pauseMenuSel===0) gameState = STATE_PLAYING;
          if(pauseMenuSel===1) leaveGame();
          lastInputTime=now+100;
      }
      if(back) { playSound('click'); gameState = STATE_PLAYING; lastInputTime=now+100; }
  }
  
  if(moved)playSound('hover');
  if(moved||select||back||navLeft||navRight||navUp||navDown)lastInputTime=now;
}

          }
        },30);
      },50);
    }
  },30);
}

// ─── TERRAIN SYSTEM & GENERATION ───
let terrainMap=new Uint8Array(MAP_W*MAP_H);

function fastCarve(cx,cy,radius,val,forceErase=false){
  cx=Math.floor(cx);cy=Math.floor(cy);const rSq=radius*radius;
  const x0=Math.max(0,cx-radius),x1=Math.min(MAP_W-1,cx+radius);
  const y0=Math.max(0,cy-radius),y1=Math.min(MAP_H-1,cy+radius);
  for(let y=y0;y<=y1;y++){
    const dy2=(y-cy)**2,row=y*MAP_W;
    for(let x=x0;x<=x1;x++){
      if(dy2+(x-cx)**2<=rSq){
        if(!forceErase&&terrainMap[row+x]===TERRAIN_ROCK)continue;
        terrainMap[row+x]=val;
      }
    }
  }
}

function jaggedCarve(cx,cy,baseRadius,forceErase=false){
  cx=Math.floor(cx);cy=Math.floor(cy); const maxR=baseRadius+10;
  const x0=Math.max(0,cx-maxR),x1=Math.min(MAP_W-1,cx+maxR);
  const y0=Math.max(0,cy-maxR),y1=Math.min(MAP_H-1,cy+maxR);
  const imgData=mapCtx.getImageData(x0,y0,x1-x0+1,y1-y0+1);
  let changed=false;
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      const dx=x-cx,dy=y-cy,dist=Math.hypot(dx,dy);
      const noise = Math.sin(Math.atan2(dy,dx)*5)*4;
      if(dist<=baseRadius+noise){
        const idx=y*MAP_W+x;
        if(terrainMap[idx]===TERRAIN_ROCK&&!forceErase)continue;
        if(terrainMap[idx]>0){
          terrainMap[idx]=0; changed=true;
          imgData.data[((y-y0)*(x1-x0+1)+(x-x0))*4+3]=0;
        }
      }
    }
  }
  if(changed){ 
    mapCtx.putImageData(imgData,x0,y0); 
    bloodCtx.save();
    bloodCtx.globalCompositeOperation = 'destination-out';
    bloodCtx.beginPath(); bloodCtx.arc(cx, cy, baseRadius+15, 0, Math.PI*2); bloodCtx.fill();
    bloodCtx.restore();
  }
}

function generateTerrain(){
  terrainMap.fill(TERRAIN_DIRT);
  
  for(let y=0;y<MAP_H;y++){
    const row=y*MAP_W;
    for(let x=0;x<MAP_W;x++){
      if(y>MAP_H-30 || y<30 || x<30 || x>MAP_W-30) terrainMap[row+x]=TERRAIN_ROCK;
    }
  }
  
  let numWorms = 18;
  for(let i=0; i<numWorms; i++) {
    let wx = 50 + seededRandom()*(MAP_W-100);
    let wy = 50 + seededRandom()*(MAP_H-100);
    let angle = seededRandom() * Math.PI * 2;
    let radius = 20 + seededRandom()*25;
    let steps = 80 + seededRandom()*150;
    
    for(let s=0; s<steps; s++) {
      fastCarve(wx, wy, radius, TERRAIN_EMPTY, true);
      wx += Math.cos(angle) * (radius * 0.5);
      wy += Math.sin(angle) * (radius * 0.5);
      angle += (seededRandom() - 0.5) * 1.5; 
      radius += (seededRandom() - 0.5) * 3;
      radius = clamp(radius, 15, 45); 
      if (wx < 50 || wx > MAP_W-50) angle += Math.PI;
      if (wy < 50 || wy > MAP_H-50) angle += Math.PI;
    }
  }
  
  for(let i=0;i<100;i++) fastCarve(50+seededRandom()*(MAP_W-100), 50+seededRandom()*(MAP_H-100), 10+seededRandom()*15, TERRAIN_ROCK, false);
  
  renderFullTerrainCanvas();
  bloodCtx.clearRect(0,0,MAP_W,MAP_H);
}

function renderFullTerrainCanvas(){
  const img=mapCtx.createImageData(MAP_W,MAP_H);
  for(let i=0;i<terrainMap.length;i++){
    if(terrainMap[i]>0){
      const p=i*4; img.data[p+3]=255;
      
      let x = i % MAP_W, y = Math.floor(i / MAP_W);
      let hash = (Math.sin(x*12.9898 + y*78.233) * 43758.5453) % 1;
      let n = (hash - 0.5) * 30; 
      
      if(terrainMap[i]===TERRAIN_ROCK){ 
        img.data[p]=clamp(90+n,0,255); img.data[p+1]=clamp(95+n,0,255); img.data[p+2]=clamp(100+n,0,255); 
      }
      else { 
        img.data[p]=clamp(110+n,0,255); img.data[p+1]=clamp(65+n,0,255); img.data[p+2]=clamp(25+n,0,255); 
      } 
    }
  }
  mapCtx.putImageData(img,0,0);
}
function isSolid(x,y){if(x<0||x>=MAP_W||y<0||y>=MAP_H)return true;return terrainMap[Math.floor(y)*MAP_W+Math.floor(x)]>0;}

function getCaveSpawn(isPlayer1) {
    for(let i=0; i<2000; i++) {
        let x = 50 + seededRandom()*(MAP_W-100);
        if (isPlayer1 && x > MAP_W/2 && i < 1000) continue; 
        if (!isPlayer1 && x < MAP_W/2 && i < 1000) continue;

        let y = 50 + seededRandom()*(MAP_H-150);
        
        if (!isSolid(x, y) && !isSolid(x, y+5) && !isSolid(x+5, y) && !isSolid(x-5, y)) {
            let groundY = y;
            while(groundY < MAP_H && !isSolid(x, groundY)) groundY++;
            if (groundY - y < 80 && groundY - y > 10) return {x: x, y: groundY - 10}; 
        }
    }
    return {x: isPlayer1 ? 100 : MAP_W-100, y: 100};
}

function explodeAndDamagePlayers(ex,ey,radius,ownerId,_unused,dmgFn,forceX,forceY){
  players.forEach(p => {
    if(p.hp>0){
      const d=Math.hypot(p.x-ex,p.y-ey);
      if(d<radius+8){
        p.takeDamage(typeof dmgFn==='function'?dmgFn(d):dmgFn, ownerId);
        p.vx+=(p.x-ex)/d*(forceX||6); p.vy+=(p.y-ey)/d*(forceY||6);
      }
    }
  });
}

// ─── ENTITIES ───
const bullets=[],grenades=[],particles=[],visualExplosions=[];
let players=[];

class VisualExplosion{
  constructor(x,y,maxR){this.x=x;this.y=y;this.maxR=maxR;this.r=0;this.life=15;this.maxLife=15;}
  update(){this.r+=(this.maxR-this.r)*0.4;this.life--;return this.life>0;}
  draw(c){
    const pct=this.life/this.maxLife; c.fillStyle=`rgba(255,${Math.floor(200*pct)},0,${pct})`;
    c.beginPath();c.arc(Math.floor(this.x),Math.floor(this.y),this.r,0,Math.PI*2);c.fill();
  }
}

class Particle {
  constructor(x, y, vx, vy, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.type = type;
    this.life = type==='smoke' ? 20+Math.random()*20 : Infinity; 
    this.maxLife = this.life; 
    this.size = type==='smoke'? 4 : (2 + Math.random()*3); 
    this.settled = false;
  }
  update() {
    if (this.settled) return false; 
    this.vy += GRAVITY * (this.type==='smoke'? -0.05 : 0.4); 
    this.x += this.vx; this.y += this.vy;
    
    if(this.type === 'smoke') { 
        this.vx *= 0.9; this.vy *= 0.9; this.size += 0.2; 
        this.life--; return this.life > 0;
    }
    if(this.type === 'blood') {
        if(isSolid(this.x, this.y)) {
            this.x -= this.vx; this.y -= this.vy; 
            if (!isSolid(this.x, this.y + 1)) {
                this.vx = 0; this.vy = 1; 
            } else {
                bloodCtx.fillStyle = 'rgba(138, 3, 3, 0.85)'; 
                let splatSize = Math.random() < 0.3 ? this.size + 2 : this.size; 
                bloodCtx.fillRect(Math.floor(this.x), Math.floor(this.y), splatSize, splatSize);
                this.settled = true; 
                return false;
            }
        }
        return true;
    }
    return true;
  }
  draw(c) {
    if (this.type === 'smoke') { 
        c.globalAlpha = this.life / this.maxLife; c.fillStyle = '#666'; 
        c.beginPath(); c.arc(Math.floor(this.x), Math.floor(this.y), this.size, 0, Math.PI*2); c.fill(); 
        c.globalAlpha = 1.0;
    } else if (this.type === 'blood' && !this.settled) { 
        c.fillStyle = '#990000'; c.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size); 
    }
  }
}

class Grenade {
  constructor(x, y, vx, vy, ownerId, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.ownerId = ownerId; this.type = type;
    this.life = (type===W_DYNAMITE)? 120 : 90; this.stuck = false;
    this.rot = 0;
  }
  update() {
    this.rot += 0.2;
    if(!this.stuck) {
      this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
      if(isSolid(this.x, this.y)) {
        if(this.type === W_DYNAMITE) { this.stuck = true; this.vx = 0; this.vy = 0; playSound('sticky_beep'); } 
        else { this.x -= this.vx; this.y -= this.vy; this.vx *= -0.5; this.vy *= -0.5; }
      }
    }
    this.life--;
    if(this.type === W_DYNAMITE && this.life % 20 === 0) playSound('sticky_beep');
    if(this.life <= 0) {
      let r = this.type === W_DYNAMITE ? 65 : 45;
      playSound('explosion_bam'); jaggedCarve(this.x, this.y, r, true); renderFullTerrainCanvas();
      visualExplosions.push(new VisualExplosion(this.x, this.y, r)); screenShake=30;
      
      players.forEach(p => {
        if(p.hp>0){
          const d=Math.hypot(p.x-this.x, p.y-this.y);
          if(d<r+8){ p.takeDamage((r+10-d)*1.5, this.ownerId); p.vx+=(p.x-this.x)/d*10; p.vy+=(p.y-this.y)/d*10; }
        }
      });
      for(let i=0; i<30; i++) particles.push(new Particle(this.x, this.y, (Math.random()-.5)*15, (Math.random()-.5)*15, 'smoke'));
      return false;
    }
    return true;
  }
  draw(c) {
    c.save(); c.translate(Math.floor(this.x), Math.floor(this.y)); c.rotate(this.rot);
    if(this.type === W_DYNAMITE) {
        c.fillStyle = '#FF2222'; c.fillRect(-2, -5, 4, 10);
        c.fillStyle = '#FFF'; c.fillRect(-2, -1, 4, 2);
    } else {
        c.fillStyle = '#228B22'; c.beginPath(); c.arc(0, 0, 4, 0, Math.PI*2); c.fill();
        c.fillStyle = '#111'; c.fillRect(-1, -5, 2, 3); // Pin
    }
    c.restore();
  }
}

class Bullet {
  constructor(x, y, vx, vy, ownerId, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.ownerId = ownerId; this.type = type; this.life = 100;
  }
  update() {
    this.vy += GRAVITY * 0.1;
    let steps = Math.ceil(Math.hypot(this.vx, this.vy));
    let dx = this.vx/steps, dy = this.vy/steps;
    for(let i=0; i<steps; i++) {
      this.x += dx; this.y += dy;
      if(this.type === W_BAZOOKA && Math.random()<0.2) particles.push(new Particle(this.x, this.y, 0, 0, 'smoke'));
      let hitSolid = isSolid(this.x, this.y);
      if(hitSolid) { this.onHit(null); return false; }
      for(const p of players) {
        if(p.id !== this.ownerId && p.hp > 0 && Math.hypot(p.x-this.x, p.y-this.y) < p.radius+4) {
          this.onHit(p); return false;
        }
      }
    }
    this.life--; return this.life > 0;
  }
  onHit(hitPlayer) {
    let x=this.x, y=this.y, oid=this.ownerId;
    if(hitPlayer) playSound('hitmarker');
    if(this.type === W_HANDGUN) { jaggedCarve(x,y,5); if(hitPlayer) hitPlayer.takeDamage(20, oid); }
    else if(this.type === W_MINIGUN) { jaggedCarve(x,y,4); if(hitPlayer) hitPlayer.takeDamage(5, oid); }
    else if(this.type === W_SHOTGUN) { jaggedCarve(x,y,7); if(hitPlayer) hitPlayer.takeDamage(15, oid); }
    else if(this.type === W_BAZOOKA) {
      playSound('explosion_bam'); jaggedCarve(x,y,48,true); renderFullTerrainCanvas();
      visualExplosions.push(new VisualExplosion(x,y,48)); screenShake=28;
      players.forEach(p => {
        if(p.hp>0){
          const d=Math.hypot(p.x-x, p.y-y);
          if(d<55){ p.takeDamage(60, oid); p.vx+=(p.x-x)/d*9; p.vy+=(p.y-y)/d*9; }
        }
      });
    }
  }
  draw(c) {
    if(this.type === W_BAZOOKA) {
        c.save(); c.translate(Math.floor(this.x), Math.floor(this.y)); c.rotate(Math.atan2(this.vy, this.vx));
        c.fillStyle = '#888'; c.fillRect(-4, -1, 6, 2);
        c.fillStyle = '#FF8800'; c.fillRect(2, -1, 3, 2);
        c.restore();
    } else {
        c.fillStyle = '#FFD700'; c.fillRect(Math.floor(this.x)-1, Math.floor(this.y)-1, 3, 3);
    }
  }
}

class Player {
  constructor(id, x, y, color, skinType) {
    this.id = id; this.x = x; this.y = y; this.color = color; this.skinType = skinType;
    this.radius = 4; this.hp = 100; this.kills = 0;
    this.vx = 0; this.vy = 0; this.aimAngle = 0; this.facingRight = true;
    
    this.weapons = wsLoadouts[id];
    this.weaponIndex = 0; 
    this.ammos = this.weapons.map(w => MAX_AMMO[w]);
    this.reloadTimers = this.weapons.map(w => 0);
    
    this.fireCooldown = 0; this.deathPhase = 'alive'; this.respawnTimer = 0;
    this.animTimer = 0; this.isWalking = false; this.onGround = false;
    
    buildPlayerSprites(this);
  }
  
  takeDamage(amount, attackerId) {
    if(this.hp <= 0) return;
    this.hp -= amount; playSound('hit');
    
    if(settingGore) {
        for(let i=0; i<30; i++) particles.push(new Particle(this.x, this.y, (Math.random()-.5)*18, -Math.random()*15, 'blood'));
    }
    
    if(this.hp <= 0) {
      this.hp = 0; this.deathPhase = 'dead'; this.respawnTimer = 120;
      playSound('explosion_puff');
      if(settingGore) {
          for(let i=0; i<50; i++) particles.push(new Particle(this.x, this.y, (Math.random()-.5)*25, (Math.random()-.5)*25, 'blood'));
      }
      
      if(attackerId !== this.id && attackerId !== undefined) {
          let attacker = players.find(p => p.id === attackerId);
          if(attacker) attacker.kills++;
      }
    }
  }

  update() {
    if(this.deathPhase === 'dead') {
      this.respawnTimer--;
      if(this.respawnTimer <= 0) {
        let spawn = getCaveSpawn(this.id === 0);
        this.x = spawn.x; this.y = spawn.y; this.vx = 0; this.vy = 0; this.hp = 100;
        this.deathPhase = 'alive'; 
        this.ammos = this.weapons.map(w => MAX_AMMO[w]); 
        playSound('spawn');
      }
      return;
    }

    if(this.fireCooldown > 0) this.fireCooldown--;
    for(let i=0; i<this.weapons.length; i++) {
      if(this.reloadTimers[i] > 0) {
        this.reloadTimers[i]--;
        if(this.reloadTimers[i] <= 0) this.ammos[i] = MAX_AMMO[this.weapons[i]];
      }
    }

    if(this.id === myPlayerId && gameState === STATE_PLAYING) {
        let input = getLocalInput();
        
        if((input.swapN || input.swapP) && this.fireCooldown <= 0) {
            if (input.swapN) this.weaponIndex = (this.weaponIndex + 1) % this.weapons.length;
            if (input.swapP) this.weaponIndex = (this.weaponIndex - 1 + this.weapons.length) % this.weapons.length;
            playSound('switch'); this.fireCooldown = 15;
        }

        this.isWalking = false;
        if(input.left) { this.vx -= 0.6; this.isWalking = true; if(!input.aimActive) this.facingRight = false; }
        if(input.right){ this.vx += 0.6; this.isWalking = true; if(!input.aimActive) this.facingRight = true; }
        if(input.aimActive) { this.aimAngle = input.aimAngle; this.facingRight = Math.abs(this.aimAngle) < Math.PI/2; }
        
        this.vx *= FRICTION; 
        
        if(input.jump && this.onGround) this.vy = -4.5;
        
        let wep = this.weapons[this.weaponIndex];
        let activeAmmo = this.ammos[this.weaponIndex];
        let activeReload = this.reloadTimers[this.weaponIndex];
        
        if(input.reload && activeAmmo < MAX_AMMO[wep] && activeReload <= 0) { 
            this.reloadTimers[this.weaponIndex] = RELOAD_TIMES[wep]; playSound('reload'); 
        }
        
        if(input.shoot && this.fireCooldown <= 0 && activeAmmo > 0 && activeReload <= 0) {
            this.ammos[this.weaponIndex]--; 
            this.fireCooldown = [15, 3, 40, 20, 60, 20, 60, 40, 30, 2, 40, 10, 20, 60, 60, 0, 40, 40, 50, 30, 80][wep];
            
            let dirX = Math.cos(this.aimAngle), dirY = Math.sin(this.aimAngle);
            let spawnX = this.x + dirX*6, spawnY = this.y + dirY*6;
            
            sendEvent('shoot', spawnX, spawnY, dirX, dirY, wep);
            
            if(wep === W_MINIGUN) { playSound('shoot_minigun'); let spread=(Math.random()-.5)*0.2; bullets.push(new Bullet(spawnX, spawnY, Math.cos(this.aimAngle+spread)*9, Math.sin(this.aimAngle+spread)*9, this.id, wep)); }
            else if(wep === W_SHOTGUN) { 
                playSound('shoot_shotgun'); 
                for(let i=0; i<8; i++) { let spread = (Math.random()-.5)*0.4; bullets.push(new Bullet(spawnX, spawnY, Math.cos(this.aimAngle+spread)*10, Math.sin(this.aimAngle+spread)*10, this.id, wep)); }
                this.vx -= dirX*3;
            }
            else if(wep === W_BAZOOKA) { playSound('explosion_puff'); bullets.push(new Bullet(spawnX, spawnY, dirX*6, dirY*6, this.id, wep)); this.vx -= dirX*3; }
            else if(wep === W_GRENADE || wep === W_DYNAMITE) { playSound('shoot_handgun'); grenades.push(new Grenade(spawnX, spawnY, dirX*7, dirY*7, this.id, wep)); }
            else if(wep === W_SHOVEL) {
                playSound('shovel');
                let digX = this.x + dirX*12; let digY = this.y + dirY*12;
                sendEvent('shovel', digX, digY, 0, 0, wep); 
                jaggedCarve(digX, digY, 15, true); renderFullTerrainCanvas();
                players.forEach(p => {
                    if(p.hp > 0 && p.id !== this.id && Math.hypot(p.x - digX, p.y - digY) < 20) {
                        p.takeDamage(25, this.id); p.vx += dirX * 5; p.vy += dirY * 5;
                    }
                });
            }
            
            if(this.ammos[this.weaponIndex] <= 0) { this.reloadTimers[this.weaponIndex] = RELOAD_TIMES[wep]; playSound('reload'); }
        }
    }

    if(!isSolid(this.x + this.vx, this.y)) this.x += this.vx; else this.vx = 0;
    
    if(!isSolid(this.x, this.y + 1)) {
        this.vy += GRAVITY; this.onGround = false;
    } else {
        this.vy = 0; 
        this.onGround = true;
        this.y = Math.floor(this.y); 
    }
    
    if(!isSolid(this.x, this.y + this.vy)) this.y += this.vy; 
    else { this.vy = 0; this.y = Math.floor(this.y); }
    
    if(this.isWalking) this.animTimer++; else this.animTimer = 0;
    this.x = clamp(this.x, 0, MAP_W-1); this.y = clamp(this.y, 0, MAP_H-1);
  }

  draw(c) {
    if(this.deathPhase !== 'alive') return;
    c.save(); 
    c.translate(Math.floor(this.x), Math.floor(this.y));
    if(!this.facingRight) c.scale(-1, 1);
    
    let bounce = (this.isWalking && Math.floor(this.animTimer/6)%2===0) ? -1 : 0;
    if(!this.onGround) bounce = -1;
    
    c.save(); c.rotate(this.facingRight ? this.aimAngle : Math.PI - this.aimAngle);
    if(this.weapons[this.weaponIndex] === W_SHOVEL) {
        c.fillStyle = '#8B4513'; c.fillRect(2, bounce, 6, 2);
        c.fillStyle = '#AAA'; c.fillRect(8, bounce-2, 3, 6);
    } else {
        c.fillStyle = '#555'; c.fillRect(2, bounce-1, 8, 3);
        c.fillStyle = '#222'; c.fillRect(10, bounce, 3, 1); 
    }
    c.restore(); 

    let sprite = this.spriteStand;
    if(!this.onGround) sprite = this.spriteJump;
    else if(this.isWalking) sprite = (Math.floor(this.animTimer/6)%2===0) ? this.spriteWalk1 : this.spriteWalk2;
    
    c.drawImage(sprite, -4, -6 + bounce);
    c.restore();
    
    c.fillStyle = this.color; c.font = "10px 'VT323', monospace"; c.textAlign = 'center';
    c.fillText(PLAYER_NAMES[this.id], Math.floor(this.x), Math.floor(this.y) - 20);
    c.fillStyle = '#F00'; c.fillRect(Math.floor(this.x)-10, Math.floor(this.y)-16, 20, 2);
    c.fillStyle = '#0F0'; c.fillRect(Math.floor(this.x)-10, Math.floor(this.y)-16, Math.max(0, this.hp/100*20), 2);
    
    let rt = this.reloadTimers[this.weaponIndex];
    let maxRt = RELOAD_TIMES[this.weapons[this.weaponIndex]];
    if(rt > 0 && maxRt > 0) {
       c.fillStyle = '#333'; c.fillRect(Math.floor(this.x)-10, Math.floor(this.y)-25, 20, 3);
       c.fillStyle = '#FFEB3B'; c.fillRect(Math.floor(this.x)-10, Math.floor(this.y)-25, 20 * (1 - rt/maxRt), 3);
    }
    c.textAlign = 'left';
  }
}

// ─── MAIN LOOP ───
function initGame(genNew) {
  if(genNew) { generateTerrain(); }
  players = []; bullets.length=0; grenades.length=0; particles.length=0; visualExplosions.length=0;
  
  let sp1 = getCaveSpawn(true);
  players.push(new Player(0, sp1.x, sp1.y, PLAYER_COLORS[0], customizeSkins[0]));
  let sp2 = getCaveSpawn(false);
  players.push(new Player(1, sp2.x, sp2.y, PLAYER_COLORS[1], customizeSkins[1]));
}

function updatePlaying() {
  if(keys.Escape || (getGamepadInput(0) && gpIs(getGamepadInput(0),'START'))) { 
      gameState = STATE_PAUSED; playSound('click'); keys.Escape=false; return; 
  }
  
  players.forEach(p => p.update());
  for(let i=bullets.length-1; i>=0; i--) if(!bullets[i].update()) bullets.splice(i,1);
  for(let i=grenades.length-1; i>=0; i--) if(!grenades[i].update()) grenades.splice(i,1);
  for(let i=particles.length-1; i>=0; i--) if(!particles[i].update()) particles.splice(i,1);
  for(let i=visualExplosions.length-1; i>=0; i--) if(!visualExplosions[i].update()) visualExplosions.splice(i,1);

  mpSyncTimer++;
  if(mpSyncTimer > 2) { 
      syncMultiplayer(); mpSyncTimer = 0;
  }

  let winner = players.find(p => p.kills >= lobbyKillsToWin);
  if(winner) {
    matchWinnerId = winner.id;
    gameState = STATE_VICTORY; victoryTimer = 300; playWinMusic();
  }
}

function drawPlaying() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  
  let target = players[myPlayerId]; 
  let camX = target.x - VIEW_W/2;
  let camY = target.y - VIEW_H/2;

  if(screenShake > 0) { camX += (Math.random()-.5)*screenShake; camY += (Math.random()-.5)*screenShake; screenShake *= 0.8; if(screenShake<1) screenShake=0; }
  
  ctx.save(); ctx.scale(SCALE, SCALE); ctx.translate(Math.floor(-camX), Math.floor(-camY));
  
  const pat = ctx.createPattern(bgNoiseCanvas, 'repeat');
  ctx.fillStyle = pat; ctx.fillRect(0,0,MAP_W,MAP_H);
  
  if(settingShadows) {
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;
  }
  
  ctx.drawImage(mapCanvas, 0, 0); 
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  
  if(settingGore) ctx.drawImage(bloodCanvas, 0, 0);
  
  grenades.forEach(g => g.draw(ctx));
  players.forEach(p => p.draw(ctx));
  bullets.forEach(b => b.draw(ctx));
  particles.forEach(p => p.draw(ctx));
  visualExplosions.forEach(v => v.draw(ctx));
  
  ctx.restore();
  
  ctx.fillStyle = '#111'; ctx.fillRect(0, CANVAS_H - HUD_H, CANVAS_W, HUD_H);
  ctx.fillStyle = '#FFF'; ctx.font = "20px 'VT323', monospace";
  
  players.forEach((p, i) => {
    let px = 20 + i * (CANVAS_W - 320); 
    ctx.fillStyle = p.color; ctx.fillText(PLAYER_NAMES[p.id] + (p.id===myPlayerId?" (YOU)":""), px, CANVAS_H - 28);
    ctx.fillStyle = '#FFF'; ctx.fillText(`HP: ${Math.floor(p.hp)} | KILLS: ${p.kills}/${lobbyKillsToWin}`, px, CANVAS_H - 10);
    
    let wep = p.weapons[p.weaponIndex];
    let ammo = p.ammos[p.weaponIndex];
    let rt = p.reloadTimers[p.weaponIndex];
    
    let wepText = `${WEAPON_NAMES[wep][currentLang]}: ${rt>0 ? 'RELOADING' : (wep===W_SHOVEL?'INF':ammo)}`;
    ctx.fillStyle = rt > 0 ? '#FFEB3B' : '#FFF';
    ctx.fillText(wepText, px + 150, CANVAS_H - 28);
  });

  ctx.fillStyle = '#0f0'; ctx.textAlign = 'right'; ctx.fillText(`PING: ${pingMs}ms`, CANVAS_W - 10, 20); ctx.textAlign = 'left';
}

// ─── 60 FPS GAME LOOP ───
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  if (timestamp - lastTime < 16) return; 
  lastTime = timestamp;

  if(!isFirebaseReady && gameState === STATE_MENU) {
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.fillStyle = '#F00'; ctx.font = "30px 'VT323', monospace"; ctx.textAlign = 'center';
      ctx.fillText("FIREBASE CONFIG PUUTTUU KÄSITKIRJOITUKSESTA!", CANVAS_W/2, CANVAS_H/2);
      ctx.fillStyle = '#FFF'; ctx.fillText("Katso HTML-tiedoston alku ja aseta config.", CANVAS_W/2, CANVAS_H/2 + 40);
      return;
  }

  if(gameState === STATE_MENU || gameState === STATE_OPTIONS || gameState === STATE_MP_MENU) {
    handleMenuInput();
    ctx.fillStyle = 'rgba(5, 5, 16, 1)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#FFF'; ctx.font = "50px 'VT323', monospace"; ctx.textAlign = 'center';
    ctx.fillText(t('WEBLIERO'), CANVAS_W/2, 100);
    
    ctx.font = "20px 'VT323', monospace"; ctx.fillStyle = '#0F0';
    ctx.fillText(`PELAAJIA ONLINE: ${onlineCount}`, CANVAS_W/2, 140);

    ctx.font = "28px 'VT323', monospace";
    
    if(gameState === STATE_MENU) {
      mainMenuOptions.forEach((opt, i) => {
        ctx.fillStyle = i === mainMenuSel ? '#0F0' : '#FFF';
        ctx.fillText(i === mainMenuSel ? `> ${t(opt)} <` : t(opt), CANVAS_W/2, 200 + i*50);
      });
    } else if(gameState === STATE_MP_MENU) {
      mpMenuOptions.forEach((opt, i) => {
        ctx.fillStyle = i === mpMenuSel ? '#0F0' : '#FFF';
        ctx.fillText(i === mpMenuSel ? `> ${t(opt)} <` : t(opt), CANVAS_W/2, 200 + i*50);
      });
    } else if(gameState === STATE_OPTIONS) {
      gfxMenuOptions.forEach((opt, i) => {
        let text = t(opt);
        if(opt==="MUSIC") text = t("MUSIC") + (settingMusic?"ON":"OFF");
        if(opt==="GORE") text = t("GORE") + (settingGore?"ON":"OFF");
        if(opt==="SHADOWS") text = t("SHADOWS") + (settingShadows?"ON":"OFF");
        
        ctx.fillStyle = i === optionsMenuSel ? '#0F0' : '#FFF';
        ctx.fillText(i === optionsMenuSel ? `> ${text} <` : text, CANVAS_W/2, 200 + i*50);
      });
    }
    ctx.textAlign = 'left';
  } 
  else if (gameState === STATE_LOBBY_WAIT) {
      handleMenuInput(); // Input valmiudelle ja takaisin painamiselle
      ctx.fillStyle = '#1a0f06'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.fillStyle = '#FFD700'; ctx.font = "40px 'VT323', monospace"; ctx.textAlign = 'center';
      
      if(currentLobbyData) {
          ctx.fillText(`LOBBY: ${currentLobbyData.name}`, CANVAS_W/2, 60);
          
          ctx.font = "30px 'VT323', monospace";
          
          // Player 1
          ctx.fillStyle = PLAYER_COLORS[0];
          let p1Ready = currentLobbyData.p1 && currentLobbyData.p1.ready;
          ctx.fillText(`${PLAYER_NAMES[0]} - ${p1Ready ? t('READY') : t('NOT_READY')}`, CANVAS_W/2, 120);
          
          // Player 2
          ctx.fillStyle = PLAYER_COLORS[1];
          if(currentLobbyData.p2) {
              let p2Ready = currentLobbyData.p2.ready;
              ctx.fillText(`${PLAYER_NAMES[1]} - ${p2Ready ? t('READY') : t('NOT_READY')}`, CANVAS_W/2, 170);
          } else {
              ctx.fillStyle = '#888';
              ctx.fillText(t('WAITING_P2'), CANVAS_W/2, 170);
          }
          
          // Ohjeet
          ctx.fillStyle = '#FFF';
          ctx.fillText(t('PRESS_READY'), CANVAS_W/2, 250);
          ctx.font = "20px 'VT323', monospace";
          ctx.fillText("O = BACK / LEAVE", CANVAS_W/2, 280);

      } else {
          ctx.fillText(t('WAITING'), CANVAS_W/2, CANVAS_H/2);
      }
      ctx.textAlign = 'left';
  }
  else if (gameState === STATE_LOADING) {
      ctx.fillStyle = 'rgba(0,0,0,1)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.fillStyle = '#0F0'; ctx.font = "50px 'VT323', monospace"; ctx.textAlign = 'center';
      ctx.fillText(t('LOADING_GAME'), CANVAS_W/2, CANVAS_H/2);
      ctx.textAlign = 'left';
  }
  else if (gameState === STATE_PLAYING) { updatePlaying(); drawPlaying(); }
  else if (gameState === STATE_PAUSED) { 
      drawPlaying(); 
      handleMenuInput(); 
      
      ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.fillStyle = '#FFF'; ctx.font = "50px 'VT323', monospace"; ctx.textAlign = 'center';
      ctx.fillText(t('GAME_PAUSED'), CANVAS_W/2, CANVAS_H/2 - 50);
      ctx.font = "30px 'VT323', monospace";
      pauseMenuOptions.forEach((opt, i) => {
          ctx.fillStyle = i === pauseMenuSel ? '#0F0' : '#FFF';
          ctx.fillText(i === pauseMenuSel ? `> ${t(opt)} <` : t(opt), CANVAS_W/2, CANVAS_H/2 + 20 + i*50);
      });
      ctx.textAlign = 'left';
  }
  else if (gameState === STATE_COUNTDOWN) { 
    drawPlaying(); 
    countdownTimer--; 
    if(countdownTimer<=0){
      countdownValue--; countdownTimer=60;
      if(countdownValue<0) gameState=STATE_PLAYING;
    }
    if(countdownValue>=0) {
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.fillStyle='#FFF'; ctx.font="80px 'VT323', monospace"; ctx.textAlign='center';
      ctx.fillText(countdownValue>0?countdownValue:"GO!", CANVAS_W/2, CANVAS_H/2);
      ctx.textAlign='left';
    }
  }
  else if (gameState === STATE_VICTORY) {
    drawPlaying();
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#FFD700'; ctx.font = "50px 'VT323', monospace"; ctx.textAlign = 'center';
    
    let text = (matchWinnerId === myPlayerId) ? "VOITIT PELIN!" : "HÄVISIT PELIN!";
    
    ctx.fillText(text, CANVAS_W/2, CANVAS_H/2);
    ctx.font = "24px 'VT323', monospace"; ctx.fillStyle = '#FFF';
    ctx.fillText("Poistutaan valikkoon...", CANVAS_W/2, CANVAS_H/2 + 50);
    ctx.textAlign = 'left';
    
    victoryTimer--;
    if(victoryTimer <= 0) leaveGame(); 
  }
  else if (gameState === STATE_DISCONNECT) {
      ctx.fillStyle = '#1a0f06'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.fillStyle = '#F00'; ctx.font = "40px 'VT323', monospace"; ctx.textAlign = 'center';
      ctx.fillText("TOINEN PELAAJA POISTUI PELISTÄ.", CANVAS_W/2, CANVAS_H/2);
      ctx.textAlign = 'left';
  }
  
  if(fadeAlpha > 0) { ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); }
}

requestAnimationFrame(gameLoop);

</script>
</body>
</html>
