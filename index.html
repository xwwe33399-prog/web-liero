<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punkkipeli</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #top-bar {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        #btn-fullscreen {
            background: #222;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 20px;
            padding: 5px 15px;
            cursor: pointer;
            text-transform: uppercase;
        }
        #btn-fullscreen:active {
            background: #555;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        canvas {
            width: 1280px; /* 4x scale */
            height: 800px;
            max-width: 95vw;
            max-height: 70vh;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-color: #3B83BD;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        #ui-bar {
            width: 1280px;
            max-width: 95vw;
            background-color: #000;
            border: 2px solid #fff;
            border-top: none;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            color: #fff; /* Changed to white */
            text-transform: uppercase;
        }
        .ui-element {
            display: flex;
            align-items: center;
        }
        .reloading {
            color: #f00 !important;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        #mobile-controls {
            width: 100%;
            max-width: 640px;
            flex-grow: 1;
            position: relative;
            margin-top: 10px;
            display: none; /* Hidden by default, shown if touch is used */
        }
        @media (pointer: coarse) {
            #mobile-controls {
                display: block;
            }
        }
        /* Enforce Vertical Mode (Portrait) */
        #orientation-lock {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            color: #fff;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-align: center;
            padding: 20px;
        }
        @media screen and (orientation: landscape) and (max-height: 600px) {
            #orientation-lock { display: flex; }
            #game-container, #mobile-controls, #top-bar { display: none !important; }
        }

        .btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-family: 'VT323', monospace;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .btn:active { background: rgba(255, 255, 255, 0.4); }
        #dpad { position: absolute; bottom: 10px; left: 10px; width: 120px; height: 120px; }
        #btn-up { top: 0; left: 40px; width: 40px; height: 40px; }
        #btn-down { bottom: 0; left: 40px; width: 40px; height: 40px; }
        #btn-left { top: 40px; left: 0; width: 40px; height: 40px; }
        #btn-right { top: 40px; right: 0; width: 40px; height: 40px; }
        #btn-jump { bottom: 70px; right: 10px; width: 50px; height: 50px; }
        #btn-use { bottom: 10px; right: 70px; width: 60px; height: 60px; }
        #btn-swap { bottom: 80px; right: 80px; width: 40px; height: 40px; font-size: 14px; }
    </style>
</head>
<body>

<div id="orientation-lock">
    PLEASE ROTATE YOUR DEVICE TO VERTICAL (PORTRAIT) MODE TO PLAY.
</div>

<div id="top-bar">
    <button id="btn-fullscreen">Toggle Fullscreen</button>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="320" height="200"></canvas>
    <div id="ui-bar">
        <div class="ui-element" id="ui-hp">HP: 100</div>
        <div class="ui-element" id="ui-wep">MINIGUN</div>
        <div class="ui-element" id="ui-ammo">100/100</div>
    </div>
</div>

<div id="mobile-controls">
    <div id="dpad">
        <div class="btn" id="btn-up">^</div>
        <div class="btn" id="btn-down">v</div>
        <div class="btn" id="btn-left">&lt;</div>
        <div class="btn" id="btn-right">&gt;</div>
    </div>
    <div class="btn" id="btn-jump">JUMP</div>
    <div class="btn" id="btn-use">USE</div>
    <div class="btn" id="btn-swap">SWAP</div>
</div>

<script>
// --- FULLSCREEN LOGIC ---
const fullscreenBtn = document.getElementById('btn-fullscreen');
fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("portrait").catch(console.error);
            }
        }).catch(err => {
            console.log(`Error attempting to enable fullscreen: ${err.message}`);
        });
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
});

// --- AUDIO SYSTEM (Upgraded) ---
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playShootSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const noise = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    
    // Tone
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
    
    // Noise (Punchy shot)
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    noise.buffer = buffer;

    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    
    osc.connect(gain);
    noise.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    noise.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function playShovelSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

function playReloadSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

// --- GAME CONSTANTS & SETUP ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const WIDTH = 320;
const HEIGHT = 200;

// Input States (Keyboard + Touch)
const keys = {
    up: false, down: false, left: false, right: false,
    jump: false, use: false, swap: false
};

const gpState = {
    jump: false, use: false, swap: false,
    moveLeft: false, moveRight: false,
    aimActive: false, aimAngle: 0
};

// UI Elements
const uiHp = document.getElementById('ui-hp');
const uiWep = document.getElementById('ui-wep');
const uiAmmo = document.getElementById('ui-ammo');

// Terrain data
const terrain = new Uint8Array(WIDTH * HEIGHT);
const terrainImageData = ctx.createImageData(WIDTH, HEIGHT);

// Colors
const COLOR_SKY = [59, 131, 189, 255];
const COLOR_DIRT = [80, 50, 25, 255]; // Solid dark dirt
const COLOR_DIRT_DETAIL = [65, 38, 18, 255]; // Slightly darker for subtle texture

function initTerrain() {
    for (let y = 0; y < HEIGHT; y++) {
        for (let x = 0; x < WIDTH; x++) {
            const idx = y * WIDTH + x;
            // Top 60px sky, rest solid soil (no random gaps)
            if (y > 60) {
                terrain[idx] = 1;
            } else {
                terrain[idx] = 0;
            }
            updateTerrainPixelBuffer(x, y, terrain[idx]);
        }
    }
}

function updateTerrainPixelBuffer(x, y, type) {
    if (x < 0 || x >= WIDTH || y < 0 || y >= HEIGHT) return;
    const idx = (y * WIDTH + x) * 4;
    if (type === 1) {
        // Subtle checkerboard/noise detail so it's not perfectly flat but has NO empty spaces
        const isDetail = (x % 2 === 0 && y % 2 !== 0) || (x % 3 === 0);
        terrainImageData.data[idx] = isDetail ? COLOR_DIRT_DETAIL[0] : COLOR_DIRT[0];
        terrainImageData.data[idx+1] = isDetail ? COLOR_DIRT_DETAIL[1] : COLOR_DIRT[1];
        terrainImageData.data[idx+2] = isDetail ? COLOR_DIRT_DETAIL[2] : COLOR_DIRT[2];
        terrainImageData.data[idx+3] = 255;
    } else {
        terrainImageData.data[idx] = COLOR_SKY[0];
        terrainImageData.data[idx+1] = COLOR_SKY[1];
        terrainImageData.data[idx+2] = COLOR_SKY[2];
        terrainImageData.data[idx+3] = COLOR_SKY[3];
    }
}

function digCircle(cx, cy, radius) {
    cx = Math.floor(cx);
    cy = Math.floor(cy);
    for (let y = -radius; y <= radius; y++) {
        for (let x = -radius; x <= radius; x++) {
            // Smoother circle math
            if (x*x + y*y <= radius*radius + 0.5) {
                const px = cx + x;
                const py = cy + y;
                if (px >= 0 && px < WIDTH && py >= 0 && py < HEIGHT) {
                    if (terrain[py * WIDTH + px] === 1) {
                        terrain[py * WIDTH + px] = 0;
                        updateTerrainPixelBuffer(px, py, 0);
                        // Spawn breaking physics particles randomly
                        if (Math.random() < 0.2) {
                            particles.push(new Particle(px, py, (Math.random()-0.5)*2, (Math.random()-1)*2));
                        }
                    }
                }
            }
        }
    }
}

function isSolid(x, y) {
    x = Math.floor(x);
    y = Math.floor(y);
    if (x < 0 || x >= WIDTH || y >= HEIGHT) return true;
    if (y < 0) return false;
    return terrain[y * WIDTH + x] === 1;
}

// --- WEAPONS ---
const WEAPONS = [
    { name: "MINIGUN", maxAmmo: 100, reloadTime: 90, fireRate: 3, isMelee: false },
    { name: "SHOVEL", maxAmmo: Infinity, reloadTime: 0, fireRate: 12, isMelee: true }
];

// --- ENTITIES ---
class Particle {
    constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.life = 20 + Math.random() * 20;
    }
    update() {
        this.vy += 0.2; // Gravity
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }
    draw(ctx) {
        if (this.life > 0) {
            ctx.fillStyle = "#412612"; // Dirt particle color
            ctx.fillRect(Math.floor(this.x), Math.floor(this.y), 1, 1);
        }
    }
}

class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.width = 6;
        this.height = 6;
        this.hp = 100;
        
        this.aimAngle = 0;
        this.facingRight = true;
        
        this.weaponIndex = 0;
        this.ammo = WEAPONS[0].maxAmmo;
        this.reloadTimer = 0;
        this.fireCooldown = 0;
        
        this.animTimer = 0;
        this.isWalking = false;
        this.onGround = false;
        
        this.swapCooldown = 0;
    }

    update() {
        if (this.hp <= 0) return;

        // Resolve inputs (Gamepad takes priority, then Keyboard/Touch)
        const moveLeft = gpState.moveLeft || keys.left;
        const moveRight = gpState.moveRight || keys.right;
        const jump = gpState.jump || keys.jump;
        const use = gpState.use || keys.use;
        const swap = gpState.swap || keys.swap;

        // Aiming (Gamepad Left Stick absolute vs Keyboard D-Pad relative)
        if (gpState.aimActive) {
            this.aimAngle = gpState.aimAngle;
            // Update facing based on aim stick horizontal axis
            if (Math.abs(this.aimAngle) > Math.PI/2) {
                this.facingRight = false;
                // Normalize angle for sprite drawing logic
                if (this.aimAngle > 0) this.aimAngle = Math.PI - this.aimAngle;
                else this.aimAngle = -Math.PI - this.aimAngle;
            } else {
                this.facingRight = true;
            }
        } else {
            if (keys.up) this.aimAngle -= 0.08;
            if (keys.down) this.aimAngle += 0.08;
        }
        
        // Clamp aim angle for drawing logic
        if (this.aimAngle < -Math.PI/2.2) this.aimAngle = -Math.PI/2.2;
        if (this.aimAngle > Math.PI/2.2) this.aimAngle = Math.PI/2.2;

        // Movement
        this.isWalking = false;
        if (moveLeft) {
            this.vx = -1.2;
            if (!gpState.aimActive) this.facingRight = false;
            this.isWalking = true;
        } else if (moveRight) {
            this.vx = 1.2;
            if (!gpState.aimActive) this.facingRight = true;
            this.isWalking = true;
        } else {
            this.vx *= 0.5; // Friction
        }

        // Jumping
        if (jump && this.onGround) {
            this.vy = -3.8;
            this.onGround = false;
        }

        // Gravity
        this.vy += 0.18;
        if (this.vy > 5) this.vy = 5;

        // Collision X
        if (!isSolid(this.x + this.vx + (this.vx > 0 ? this.width/2 : -this.width/2), this.y)) {
            this.x += this.vx;
        } else {
            this.vx = 0;
        }

        // Collision Y
        this.onGround = false;
        if (this.vy > 0) { // Falling
            if (isSolid(this.x, this.y + this.height/2 + this.vy)) {
                this.vy = 0;
                this.y = Math.floor(this.y);
                this.onGround = true;
            } else {
                this.y += this.vy;
            }
        } else if (this.vy < 0) { // Jumping up
            if (isSolid(this.x, this.y - this.height/2 + this.vy)) {
                this.vy = 0;
            } else {
                this.y += this.vy;
            }
        }

        // Weapon Swapping
        if (this.swapCooldown > 0) this.swapCooldown--;
        if (swap && this.swapCooldown === 0) {
            this.weaponIndex = (this.weaponIndex + 1) % WEAPONS.length;
            this.ammo = WEAPONS[this.weaponIndex].maxAmmo;
            this.reloadTimer = 0;
            this.swapCooldown = 20;
        }

        // Firing Mechanics
        if (this.fireCooldown > 0) this.fireCooldown--;
        
        const currentWeapon = WEAPONS[this.weaponIndex];
        
        if (this.reloadTimer > 0) {
            this.reloadTimer--;
            if (this.reloadTimer === 0) {
                this.ammo = currentWeapon.maxAmmo;
            }
        } else if (use && this.fireCooldown === 0) {
            initAudio();
            const actualAimAngle = this.facingRight ? this.aimAngle : Math.PI - this.aimAngle;
            
            if (currentWeapon.isMelee) { // Shovel
                const reachX = this.x + Math.cos(actualAimAngle) * 10;
                const reachY = this.y + Math.sin(actualAimAngle) * 10;
                digCircle(reachX, reachY, 7); // Bigger scoop
                playShovelSound();
                this.fireCooldown = currentWeapon.fireRate;
            } else { // Minigun
                if (this.ammo > 0) {
                    this.ammo--;
                    const dirX = Math.cos(actualAimAngle);
                    const dirY = Math.sin(actualAimAngle);
                    
                    const spread = (Math.random() - 0.5) * 0.15;
                    const finalDirX = dirX * Math.cos(spread) - dirY * Math.sin(spread);
                    const finalDirY = dirX * Math.sin(spread) + dirY * Math.cos(spread);

                    bullets.push(new Bullet(this.x + dirX*6, this.y + dirY*6, finalDirX * 7, finalDirY * 7));
                    playShootSound();
                    
                    // Increased Recoil
                    this.vx -= dirX * 1.5; 
                    this.vy -= dirY * 0.5;
                    this.fireCooldown = currentWeapon.fireRate;
                } else {
                    this.reloadTimer = currentWeapon.reloadTime;
                    playReloadSound();
                }
            }
        }

        // Animation
        if (this.isWalking) this.animTimer++;
        else this.animTimer = 0;
    }

    draw(ctx) {
        if (this.hp <= 0) return;
        
        ctx.save();
        ctx.translate(Math.floor(this.x), Math.floor(this.y));
        if (!this.facingRight) ctx.scale(-1, 1);

        // Animation bounce
        let bounce = 0;
        if (this.isWalking && this.onGround) {
            bounce = (Math.floor(this.animTimer / 4) % 2) === 0 ? -1 : 0;
        } else if (!this.onGround) {
            bounce = -1;
        }

        // Helmet / Head detail
        ctx.fillStyle = "#333";
        ctx.fillRect(-3, -4 + bounce, 6, 2);
        
        // Body (Worm skin)
        ctx.fillStyle = "#FF99AA";
        ctx.fillRect(-3, -2 + bounce, 6, 5);
        
        // Eye
        ctx.fillStyle = "#000";
        ctx.fillRect(1, -2 + bounce, 1, 1);

        // Weapon
        ctx.rotate(this.aimAngle);
        if (this.weaponIndex === 0) { // Detailed Minigun
            ctx.fillStyle = "#444";
            ctx.fillRect(2, bounce, 8, 3); // Gun Body
            ctx.fillStyle = "#222";
            ctx.fillRect(10, bounce, 4, 1); // Barrel 1
            ctx.fillRect(10, bounce + 2, 4, 1); // Barrel 2
            // Muzzle flash if firing
            if (gpState.use || keys.use) {
                if (Math.random() > 0.5 && this.ammo > 0 && this.reloadTimer === 0) {
                    ctx.fillStyle = "#FFAA00";
                    ctx.fillRect(14, bounce, 3, 3);
                }
            }
        } else { // Detailed Shovel
            ctx.fillStyle = "#5c3a21"; // Wood handle
            ctx.fillRect(2, bounce, 8, 1);
            ctx.fillStyle = "#bdc3c7"; // Metal head
            ctx.beginPath();
            ctx.moveTo(10, bounce - 2);
            ctx.lineTo(13, bounce - 2);
            ctx.lineTo(14, bounce + 1);
            ctx.lineTo(10, bounce + 1);
            ctx.fill();
        }
        
        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.active = true;
    }

    update() {
        if (!this.active) return;
        this.vy += 0.05; // bullet drop
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x >= WIDTH || this.y >= HEIGHT) {
            this.active = false;
            return;
        }

        if (isSolid(this.x, this.y)) {
            digCircle(this.x, this.y, 3); // Bullet explosion hole
            this.active = false;
        }
    }

    draw(ctx) {
        if (!this.active) return;
        ctx.fillStyle = "#FFDD00";
        ctx.fillRect(Math.floor(this.x), Math.floor(this.y), 2, 2);
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(Math.floor(this.x)+1, Math.floor(this.y), 1, 1);
    }
}

// --- GLOBAL VARIABLES ---
let player;
let bullets = [];
let particles = [];

// --- INITIALIZATION ---
function init() {
    initTerrain();
    player = new Player(WIDTH / 2, 20);
    requestAnimationFrame(gameLoop);
}

// --- GAMEPAD API POLLING ---
function pollGamepad() {
    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    if (!gamepads || !gamepads[0]) return;
    
    const gp = gamepads[0];
    
    // Buttons based on Standard DualSense Mapping
    gpState.jump = gp.buttons[0]?.pressed || false; // X button
    gpState.swap = gp.buttons[6]?.pressed || gp.buttons[6]?.value > 0.5 || false; // L2
    gpState.use = gp.buttons[7]?.pressed || gp.buttons[7]?.value > 0.5 || false; // R2
    
    // Right Joystick (Axes 2, 3) - Move
    const rightStickX = gp.axes[2] || 0;
    gpState.moveLeft = rightStickX < -0.3;
    gpState.moveRight = rightStickX > 0.3;

    // Left Joystick (Axes 0, 1) - Aim
    const leftStickX = gp.axes[0] || 0;
    const leftStickY = gp.axes[1] || 0;
    
    if (Math.abs(leftStickX) > 0.2 || Math.abs(leftStickY) > 0.2) {
        gpState.aimActive = true;
        gpState.aimAngle = Math.atan2(leftStickY, leftStickX);
    } else {
        gpState.aimActive = false;
    }
}

// --- UPDATE & RENDER LOOP ---
function update() {
    pollGamepad();
    player.update();
    
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].update();
        if (!bullets[i].active) bullets.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    // Update UI
    uiHp.innerText = `HP: ${player.hp}`;
    uiWep.innerText = WEAPONS[player.weaponIndex].name;
    
    if (player.reloadTimer > 0) {
        uiAmmo.innerText = "RELOADING...";
        uiAmmo.className = "ui-element reloading";
    } else {
        const wep = WEAPONS[player.weaponIndex];
        uiAmmo.innerText = wep.isMelee ? "INF/INF" : `${player.ammo}/${wep.maxAmmo}`;
        uiAmmo.className = "ui-element";
    }
}

function draw() {
    ctx.putImageData(terrainImageData, 0, 0);

    for (let p of particles) p.draw(ctx);
    for (let b of bullets) b.draw(ctx);
    
    player.draw(ctx);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// --- INPUT HANDLING (Keyboard & Touch) ---
window.addEventListener('keydown', (e) => {
    switch(e.code) {
        case 'KeyW': case 'ArrowUp': keys.up = true; break;
        case 'KeyS': case 'ArrowDown': keys.down = true; break;
        case 'KeyA': case 'ArrowLeft': keys.left = true; break;
        case 'KeyD': case 'ArrowRight': keys.right = true; break;
        case 'Space': keys.jump = true; break;
        case 'ControlLeft': case 'ControlRight': case 'KeyE': keys.use = true; break;
        case 'KeyQ': case 'ShiftLeft': keys.swap = true; break;
    }
});
window.addEventListener('keyup', (e) => {
    switch(e.code) {
        case 'KeyW': case 'ArrowUp': keys.up = false; break;
        case 'KeyS': case 'ArrowDown': keys.down = false; break;
        case 'KeyA': case 'ArrowLeft': keys.left = false; break;
        case 'KeyD': case 'ArrowRight': keys.right = false; break;
        case 'Space': keys.jump = false; break;
        case 'ControlLeft': case 'ControlRight': case 'KeyE': keys.use = false; break;
        case 'KeyQ': case 'ShiftLeft': keys.swap = false; break;
    }
});

function bindTouch(btnId, keyName) {
    const btn = document.getElementById(btnId);
    if(!btn) return;
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        keys[keyName] = true;
    });
    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        keys[keyName] = false;
    });
}
bindTouch('btn-up', 'up'); bindTouch('btn-down', 'down');
bindTouch('btn-left', 'left'); bindTouch('btn-right', 'right');
bindTouch('btn-jump', 'jump'); bindTouch('btn-use', 'use');
bindTouch('btn-swap', 'swap');

init();

</script>
</body>
