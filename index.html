<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PunkkiGAME v8</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #1a0f06;
        display: flex; justify-content: center; align-items: center;
        overflow: hidden; font-family: 'VT323', monospace; color: #fff;
      }
      #gameWrapper {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex; justify-content: center; align-items: center;
      }
      #gameCanvas {
        image-rendering: pixelated;
        border: none;
        width: 100vw;
        height: 100vh;
        object-fit: fill;
      }
      #menuGif {
        position: absolute;
        left: 80%; top: 70%;
        transform: translate(-50%, -50%);
        width: 450px; height: 350px;
        border: 3px solid #664;
        display: none;
        pointer-events: none;
        z-index: 5;
        image-rendering: pixelated;
      }
      #instructions {
        position: absolute;
        bottom: 8px; left: 0; width: 100%;
        color: #FFF;
        font-size: 12px;
        text-align: center; pointer-events: none;
        text-shadow: 1px 1px 2px #000;
        letter-spacing: 0.5px;
        background: rgba(0, 0, 0, 0.45);
        padding: 4px 0;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <input type="file" id="levelFileInput" accept=".json" style="display:none;">
    <div id="gameWrapper">
      <img id="menuGif" src="https://www.liero.be/img/liero.gif" alt="Gameplay">
      <canvas id="gameCanvas"></canvas>
      <div id="instructions">
        PS5/PS4: L-STICK/D-PAD: Move | R-STICK: Aim | X: Jump | □: Rope | R2: Shoot | △: Shield | L1/L2: Swap Wep | OPTIONS: Pause
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
