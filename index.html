// ─── FULLSCREEN LOGIC (PS5 Fallback) ───
function toggleFullscreen() {
  const elem = document.documentElement;
  if (!document.fullscreenElement && !document.body.classList.contains("css-fullscreen")) {
    if (elem.requestFullscreen) {
      elem.requestFullscreen().catch(err => {
        console.log("Native API failed, using CSS fallback.");
        document.body.classList.add("css-fullscreen");
      });
    } else {
      document.body.classList.add("css-fullscreen");
    }
  } else {
    if (document.exitFullscreen && document.fullscreenElement) {
      document.exitFullscreen();
    }
    document.body.classList.remove("css-fullscreen");
  }
}
document.getElementById('fsBtn').addEventListener('click', toggleFullscreen);

function getSpriteColor(c,color){
  if(c===' ')return null; if(c==='1')return color; if(c==='2')return '#1A5B9E';
  if(c==='3')return '#FFCDB2'; if(c==='4')return '#FFFFFF'; if(c==='5')return '#000000';
  if(c==='A')return '#C87820'; if(c==='B')return '#8B4010'; if(c==='C')return '#FFCDB2'; return '#FF00FF';
}
function genSprite(rows,color){
  const sc=document.createElement('canvas'); sc.width=9;sc.height=11; const sx=sc.getContext('2d');
  for(let y=0;y<rows.length;y++){
    for(let x=0;x<rows[y].length;x++){
      const col=getSpriteColor(rows[y][x],color);
      if(col){ sx.fillStyle=col;sx.fillRect(x,y,1,1); }

  }
  return sc;
}

function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterSFXGain=audioCtx.createGain();masterMusicGain=audioCtx.createGain();
    masterSFXGain.connect(audioCtx.destination);masterMusicGain.connect(audioCtx.destination);
    masterSFXGain.gain.value=settingSfxVol/10; masterMusicGain.gain.value=settingMusicVol/10;
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function playSound(type){
  if(!audioCtx)return; const now=audioCtx.currentTime;
  const mkOG=(oscType,freq,vol,dur,freqEnd)=>{
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.connect(g);g.connect(masterSFXGain);osc.type=oscType;
    osc.frequency.setValueAtTime(freq,now);
    if(freqEnd)osc.frequency.exponentialRampToValueAtTime(freqEnd,now+dur);
    g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+dur);
    osc.start(now);osc.stop(now+dur);
  };
  if(type==='hover')mkOG('sine',1000,0.05,0.04,600);
  else if(type==='click')mkOG('square',500,0.1,0.08,200);
  else if(type==='shoot_handgun')mkOG('square',380,0.25,0.12,80);
  else if(type==='shoot_minigun')mkOG('sawtooth',200+Math.random()*60,0.18,0.1,30);
  else if(type==='shoot_shotgun'){for(let i=0;i<3;i++)setTimeout(()=>{if(audioCtx)mkOG('square',150+Math.random()*80,0.2,0.12,20);},i*10);}
  else if(type==='hit')mkOG('square',90,0.35,0.1,18);
  else if(type==='hitmarker'){mkOG('sawtooth',320,0.4,0.06,40);mkOG('square',1200,0.15,0.04,200);}
  else if(type==='reload')mkOG('triangle',180,0.12,0.35,320);
  else if(type==='switch')mkOG('sine',700,0.1,0.1,900);
  else if(type==='grenade_bounce')mkOG('triangle',130,0.12,0.1,60);
  else if(type==='spawn')mkOG('square',300,0.2,0.4,600);
  else if(type==='explosion_bam'){
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.connect(g);g.connect(masterSFXGain);osc.type='square';
    osc.frequency.setValueAtTime(60,now);osc.frequency.exponentialRampToValueAtTime(5,now+0.8);
    g.gain.setValueAtTime(1.5,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.8);
    osc.start(now);osc.stop(now+0.8);
  }
  else if(type==='explosion_puff')mkOG('sine',60,0.5,0.3,15);
  else if(type==='sticky_beep')mkOG('square',1100,0.2,0.05,700);
}

function gpIs(gp,action){
  if(!gp||!gp.connected)return false;
  const b=(i)=>gp.buttons.length>i&&gp.buttons[i].pressed;
  const ax=(i)=>gp.axes.length>i?gp.axes[i]:0;
  // PS5 DualSense mapping logic
  switch(action){
    case 'UP':return b(12)||ax(1)<-0.5;
    case 'DOWN':return b(13)||ax(1)>0.5;
    case 'LEFT':return b(14)||ax(0)<-0.5;
    case 'RIGHT':return b(15)||ax(0)>0.5;
    case 'SELECT':return b(0); // X
    case 'BACK':return b(1); // Circle
    case 'TRIANGLE':return b(3); // Triangle
    case 'SQUARE': return b(2); // Square
  }
  return false;
}
function getGamepadInput(playerIndex){
  const gamepads=navigator.getGamepads?navigator.getGamepads():[];
  if(activeGamepadIndices[playerIndex]==='BOT'||activeGamepadIndices[playerIndex]==='KBD') return null;
  let rawIndex = activeGamepadIndices[playerIndex];
  if (rawIndex !== undefined && gamepads[rawIndex] && gamepads[rawIndex].connected) return gamepads[rawIndex];
  let connected=[];
  for(let i=0;i<gamepads.length;i++)if(gamepads[i]&&gamepads[i].connected)connected.push(gamepads[i]);
  return connected[playerIndex]||null;
}
const gpBtn=(gp,i)=>gp&&gp.buttons&&gp.buttons[i]&&gp.buttons[i].pressed;
const gpAx=(gp,i)=>(gp&&gp.axes&&gp.axes.length>i)?gp.axes[i]:0;
const wrap=(v,len)=>((v%len)+len)%len;
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));

function handleMenuInput(){
  const now=Date.now();
  let navUp=false,navDown=false,navLeft=false,navRight=false,select=false,back=false, fsPress=false;
  if(now-lastInputTime>150){if(keys.ArrowUp)navUp=true;if(keys.ArrowDown)navDown=true;if(keys.ArrowLeft)navLeft=true;if(keys.ArrowRight)navRight=true;}
  if(now-lastInputTime>200){if(keys.Enter)select=true;if(keys.Escape)back=true;}
  
  const gamepads=navigator.getGamepads?navigator.getGamepads():[];
  for(let i=0;i<gamepads.length;i++){
    const gp=gamepads[i];if(!gp||!gp.connected)continue;
    if(now-lastInputTime>150){if(gpIs(gp,'UP'))navUp=true;if(gpIs(gp,'DOWN'))navDown=true;if(gpIs(gp,'LEFT'))navLeft=true;if(gpIs(gp,'RIGHT'))navRight=true;}
    if(now-lastInputTime>200){
      if(gpIs(gp,'SELECT'))select=true; 
      if(gpIs(gp,'BACK'))back=true;
      if(gpIs(gp,'SQUARE')) fsPress=true; // PS5 Neliö = Fullscreen
    }
  }

  if(fsPress) { toggleFullscreen(); playSound('click'); lastInputTime=now+200; }

  let moved=false;
  if(gameState===STATE_MENU){
    if(!isMenuMusicPlaying&&audioCtx)startMenuMusic();
    let oldSel=mainMenuSel;
    if(navUp)mainMenuSel=wrap(mainMenuSel-1,mainMenuOptions.length);
    if(navDown)mainMenuSel=wrap(mainMenuSel+1,mainMenuOptions.length);
    if(oldSel!==mainMenuSel)moved=true;
    if(moved)playSound('hover');
    if(select){
      playSound('click');
      if(mainMenuSel===0){is4PlayerMode=false;isArenaMode=false;isSinglePlayer=false;doBeginGame(true);}
      else if(mainMenuSel===1){is4PlayerMode=false;isArenaMode=false;isSinglePlayer=true;doBeginGame(true);}
      else if(mainMenuSel===2){is4PlayerMode=true;isArenaMode=false;isSinglePlayer=false;doBeginGame(true);}
      else if(mainMenuSel===3){is4PlayerMode=false;isArenaMode=true;isSinglePlayer=false;gameMode='ARENA';doBeginGame(true);}
      else if(mainMenuSel===4){customizeSel=0;gameState=STATE_CUSTOMIZE;}
      else if(mainMenuSel===6)gameState=STATE_OPTIONS;
    }
  }
  else if(gameState===STATE_OPTIONS){
    let oldSel=optionsMenuSel;
    if(navUp)optionsMenuSel=wrap(optionsMenuSel-1,3);
    if(navDown)optionsMenuSel=wrap(optionsMenuSel+1,3);
    if(oldSel!==optionsMenuSel)moved=true;
    if(moved)playSound('hover');
    if(back || (select && optionsMenuSel===2)){playSound('click');gameState=STATE_MENU;}
  }
  else if(gameState===STATE_JOINING) {
    if(keys.Enter&&!joinedPlayers.has('KBD')){joinedPlayers.add('KBD');playSound('spawn');}
    for(let i=0;i<gamepads.length;i++){
      const gp=gamepads[i];if(!gp||!gp.connected)continue;
      if(gpIs(gp,'SELECT')&&!joinedPlayers.has(i)){joinedPlayers.add(i);playSound('spawn');}
      if(gpIs(gp,'BACK')){playSound('click');joinedPlayers.clear();activeGamepadIndices=[];gameState=STATE_MENU;return;}
    }
    const needed = is4PlayerMode?4:2;
    if(joinedPlayers.size >= needed) {
      activeGamepadIndices=Array.from(joinedPlayers).slice(0,needed);
      wsReady=[false,false,false,false]; gameState=STATE_WEAPON_SELECT;
    }
  }
  else if(gameState===STATE_WEAPON_SELECT) {
    let allReady=true;
    for(let i=0; i<(is4PlayerMode?4:2); i++) {
      if(!wsReady[i] && (select || (getGamepadInput(i) && gpIs(getGamepadInput(i),'SELECT')))) {
        wsReady[i]=true; playSound('click');
      }
      if(!wsReady[i]) allReady=false;
    }
    if(allReady) { stopMenuMusic(); gameState=STATE_LEVEL_PROMPT; lastInputTime=now+100; }
  }
  else if(gameState===STATE_LEVEL_PROMPT) {
    if(select) { playSound('click'); startFadeToGame(true); }
  }
  
  if(moved||select||back||navLeft||navRight)lastInputTime=now;
}

function doBeginGame(fullReset){
  if(fullReset){
    joinedPlayers.clear(); activeGamepadIndices=[]; 
    if(isSinglePlayer) {
      // Yksinpeli: Pelaaja 1 + Botti
      activeGamepadIndices = [0, 'BOT'];
      gameState=STATE_WEAPON_SELECT;
    } else {
      gameState=STATE_JOINING;
    }
  } else { startFadeToGame(true); }
}

function startFadeToGame(genNew){
  gameState=STATE_FADING; fadeAlpha=0;
  const fi=setInterval(()=>{
    fadeAlpha+=0.05;
    if(fadeAlpha>=1.0){
      clearInterval(fi); gameState=STATE_LOADING;
      setTimeout(()=>{
        initGame(genNew);
        const fi2=setInterval(()=>{
          fadeAlpha-=0.05;
          if(fadeAlpha<=0){
            clearInterval(fi2); gameState=STATE_COUNTDOWN;
            countdownValue=3;countdownTimer=60; playSound('spawn');
          }
        },30);
      },50);
    }
  },30);
}

// ─── TERRAIN SYSTEM ───
let terrainMap=new Uint8Array(MAP_W*MAP_H);
function fastCarve(cx,cy,radius,val,forceErase=false){
  cx=Math.floor(cx);cy=Math.floor(cy);const rSq=radius*radius;
  const x0=Math.max(0,cx-radius),x1=Math.min(MAP_W-1,cx+radius);
  const y0=Math.max(0,cy-radius),y1=Math.min(MAP_H-1,cy+radius);
  for(let y=y0;y<=y1;y++){
    const dy2=(y-cy)**2,row=y*MAP_W;
    for(let x=x0;x<=x1;x++){
      if(dy2+(x-cx)**2<=rSq){
        if(!forceErase&&terrainMap[row+x]===TERRAIN_ROCK)continue;
        terrainMap[row+x]=val;
      }
    }
  }
}
function jaggedCarve(cx,cy,baseRadius,forceErase=false){
  cx=Math.floor(cx);cy=Math.floor(cy); const maxR=baseRadius+10;
  const x0=Math.max(0,cx-maxR),x1=Math.min(MAP_W-1,cx+maxR);
  const y0=Math.max(0,cy-maxR),y1=Math.min(MAP_H-1,cy+maxR);
  const imgData=mapCtx.getImageData(x0,y0,x1-x0+1,y1-y0+1);
  let changed=false;
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      const dx=x-cx,dy=y-cy,dist=Math.hypot(dx,dy);
      const noise = Math.sin(Math.atan2(dy,dx)*5)*4;
      if(dist<=baseRadius+noise){
        const idx=y*MAP_W+x;
        if(terrainMap[idx]===TERRAIN_ROCK&&!forceErase)continue;
        if(terrainMap[idx]>0){
          terrainMap[idx]=0; changed=true;
          imgData.data[((y-y0)*(x1-x0+1)+(x-x0))*4+3]=0;
        }
      }
    }
  }
  if(changed){ mapCtx.putImageData(imgData,x0,y0); bloodCtx.clearRect(x0,y0,x1-x0+1,y1-y0+1); }
}

function generateTerrain(){
  terrainMap.fill(TERRAIN_DIRT);
  for(let y=0;y<MAP_H;y++){
    const row=y*MAP_W;
    for(let x=0;x<MAP_W;x++){
      if(y>MAP_H-20)terrainMap[row+x]=TERRAIN_ROCK;
      else if(x<5||x>MAP_W-6||y<5)terrainMap[row+x]=TERRAIN_ROCK;
    }
  }
  for(let i=0;i<40;i++) fastCarve(50+Math.random()*(MAP_W-100), 50+Math.random()*(MAP_H-100), 20+Math.random()*30, TERRAIN_EMPTY, true);
  renderFullTerrainCanvas();
}
function generateArenaTerrain(){
  terrainMap.fill(TERRAIN_EMPTY);
  for(let x=0;x<MAP_W;x++)for(let y=MAP_H-30;y<MAP_H;y++)terrainMap[y*MAP_W+x]=TERRAIN_ROCK;
  for(let y=0;y<MAP_H;y++){terrainMap[y*MAP_W+0]=TERRAIN_ROCK;terrainMap[y*MAP_W+MAP_W-1]=TERRAIN_ROCK;}
  for(let x=20;x<MAP_W-20;x++){terrainMap[(MAP_H-30)*MAP_W+x]=TERRAIN_ROCK;terrainMap[(MAP_H-31)*MAP_W+x]=TERRAIN_DIRT;}
  renderFullTerrainCanvas();
}

function renderFullTerrainCanvas(){
  const img=mapCtx.createImageData(MAP_W,MAP_H);
  for(let i=0;i<terrainMap.length;i++){
    if(terrainMap[i]>0){
      const p=i*4; img.data[p+3]=255;
      if(terrainMap[i]===TERRAIN_ROCK){ img.data[p]=100;img.data[p+1]=100;img.data[p+2]=100; }
      else { img.data[p]=120;img.data[p+1]=70;img.data[p+2]=30; }
    }
  }
  mapCtx.putImageData(img,0,0);
}
function isSolid(x,y){if(x<0||x>=MAP_W||y<0||y>=MAP_H)return true;return terrainMap[Math.floor(y)*MAP_W+Math.floor(x)]>0;}

function explodeAndDamagePlayers(ex,ey,radius,ownerId,_unused,dmgFn,forceX,forceY){
  players.forEach(p => {
    if(p.hp>0){
      const d=Math.hypot(p.x-ex,p.y-ey);
      if(d<radius+8){
        p.takeDamage(typeof dmgFn==='function'?dmgFn(d):dmgFn, ownerId);
        p.vx+=(p.x-ex)/d*(forceX||6); p.vy+=(p.y-ey)/d*(forceY||6);
      }
    }
  });
}

// ─── ENTITIES ───
const bullets=[],grenades=[],particles=[],visualExplosions=[];
let players=[];

class VisualExplosion{
  constructor(x,y,maxR){this.x=x;this.y=y;this.maxR=maxR;this.r=0;this.life=15;this.maxLife=15;}
  update(){this.r+=(this.maxR-this.r)*0.4;this.life--;return this.life>0;}
  draw(c){
    const pct=this.life/this.maxLife; c.fillStyle=`rgba(255,${Math.floor(200*pct)},0,${pct})`;
    c.beginPath();c.arc(Math.floor(this.x),Math.floor(this.y),this.r,0,Math.PI*2);c.fill();
  }
}

class Particle {
  constructor(x, y, vx, vy, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.type = type;
    this.life = type==='blood'?40+Math.random()*20 : 20+Math.random()*20;
    this.maxLife = this.life; this.size = type==='smoke'?4:2;
  }
  update() {
    this.vy += GRAVITY * (this.type==='smoke'? -0.05 : 0.5);
    this.x += this.vx; this.y += this.vy;
    if(this.type === 'smoke') { this.vx *= 0.9; this.vy *= 0.9; this.size += 0.2; }
    if(this.type === 'blood' && isSolid(this.x, this.y)) { this.vx=0; this.vy=0; }
    this.life--; return this.life > 0;
  }
  draw(c) {
    let alpha = this.life / this.maxLife; c.globalAlpha = alpha;
    if(this.type === 'smoke') { c.fillStyle = '#666'; c.beginPath(); c.arc(Math.floor(this.x), Math.floor(this.y), this.size, 0, Math.PI*2); c.fill(); } 
    else if(this.type === 'blood') { c.fillStyle = '#B20000'; c.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size); }
    c.globalAlpha = 1.0;
  }
}

class Grenade {
  constructor(x, y, vx, vy, ownerId, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.ownerId = ownerId; this.type = type;
    this.life = (type===W_DYNAMITE)? 120 : 90; this.stuck = false;
  }
  update() {
    if(!this.stuck) {
      this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
      if(isSolid(this.x, this.y)) {
        if(this.type === W_DYNAMITE) { this.stuck = true; this.vx = 0; this.vy = 0; playSound('sticky_beep'); } 
        else { this.x -= this.vx; this.y -= this.vy; this.vx *= -0.5; this.vy *= -0.5; }
      }
    }
    this.life--;
    if(this.type === W_DYNAMITE && this.life % 20 === 0) playSound('sticky_beep');
    if(this.life <= 0) {
      let r = this.type === W_DYNAMITE ? 65 : 45;
      playSound('explosion_bam'); jaggedCarve(this.x, this.y, r, true); renderFullTerrainCanvas();
      visualExplosions.push(new VisualExplosion(this.x, this.y, r)); screenShake=30;
      explodeAndDamagePlayers(this.x, this.y, r+10, this.ownerId, null, (d)=>(r+10-d)*1.5, 10, 10);
      for(let i=0; i<30; i++) particles.push(new Particle(this.x, this.y, (Math.random()-.5)*15, (Math.random()-.5)*15, 'smoke'));
      return false;
    }
    return true;
  }
  draw(c) {
    c.fillStyle = (this.type === W_DYNAMITE) ? '#FF2222' : '#228B22';
    c.beginPath(); c.arc(Math.floor(this.x), Math.floor(this.y), 3, 0, Math.PI*2); c.fill();
    if(this.type === W_DYNAMITE) { c.fillStyle='#FFF'; c.fillRect(Math.floor(this.x)-1, Math.floor(this.y)-4, 2, 3); }
  }
}

class Bullet {
  constructor(x, y, vx, vy, ownerId, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.ownerId = ownerId; this.type = type; this.life = 100;
  }
  update() {
    this.vy += GRAVITY * 0.1;
    let steps = Math.ceil(Math.hypot(this.vx, this.vy));
    let dx = this.vx/steps, dy = this.vy/steps;
    for(let i=0; i<steps; i++) {
      this.x += dx; this.y += dy;
      let hitSolid = isSolid(this.x, this.y);
      if(hitSolid) { this.onHit(null); return false; }
      for(const p of players) {
        if(p.id !== this.ownerId && p.hp > 0 && Math.hypot(p.x-this.x, p.y-this.y) < p.radius+4) {
          this.onHit(p); return false;
        }
      }
    }
    this.life--; return this.life > 0;
  }
  onHit(hitPlayer) {
    let x=this.x, y=this.y, oid=this.ownerId;
    if(hitPlayer) playSound('hitmarker');
    if(this.type === W_HANDGUN) { jaggedCarve(x,y,5); if(hitPlayer) hitPlayer.takeDamage(20, oid); }
    else if(this.type === W_MINIGUN) { jaggedCarve(x,y,4); if(hitPlayer) hitPlayer.takeDamage(5, oid); }
    else if(this.type === W_SHOTGUN) { jaggedCarve(x,y,7); if(hitPlayer) hitPlayer.takeDamage(15, oid); }
    else if(this.type === W_BAZOOKA) {
      playSound('explosion_bam'); jaggedCarve(x,y,48,true); renderFullTerrainCanvas();
      visualExplosions.push(new VisualExplosion(x,y,48)); screenShake=28;
      explodeAndDamagePlayers(x,y,55,oid,null,60,9,9);
    }
  }
  draw(c) {
    if(this.type === W_BAZOOKA) c.fillStyle = '#FF8800'; else c.fillStyle = '#FFD700';
    c.fillRect(Math.floor(this.x)-1, Math.floor(this.y)-1, 3, 3);
  }
}

class Player {
  constructor(id, x, y, color, skinType, isBot = false) {
    this.id = id; this.x = x; this.y = y; this.color = color; this.skinType = skinType; this.isBot = isBot;
    this.radius = 4; this.hp = 100; this.lives = settingLives; this.kills = 0;
    this.vx = 0; this.vy = 0; this.aimAngle = 0; this.facingRight = true;
    this.weaponIndex = 0; this.weapons = wsLoadouts[id] || [0,8,13,12,4,2];
    this.ammo = MAX_AMMO[this.weapons[this.weaponIndex]];
    this.reloadTimer = 0; this.fireCooldown = 0; this.deathPhase = 'alive'; this.respawnTimer = 0;
    this.animTimer = 0; this.isWalking = false; buildPlayerSprites(this);
  }
  
  takeDamage(amount, attackerId) {
    if(this.hp <= 0) return;
    this.hp -= amount; playSound('hit');
    for(let i=0; i<10; i++) particles.push(new Particle(this.x, this.y, (Math.random()-.5)*8, (Math.random()-.5)*8, 'blood'));
    if(this.hp <= 0) {
      this.hp = 0; this.deathPhase = 'dead'; this.respawnTimer = 180;
      playSound('explosion_puff');
      if(this.lives > 0) this.lives--;
    }
  }

  update() {
    if(this.deathPhase === 'dead') {
      this.respawnTimer--;
      if(this.respawnTimer <= 0 && this.lives > 0) {
        this.x = 100 + Math.random()*(MAP_W-200); this.y = 50; this.vx = 0; this.vy = 0; this.hp = 100;
        this.deathPhase = 'alive'; this.ammo = MAX_AMMO[this.weapons[this.weaponIndex]]; playSound('spawn');
      }
      return;
    }

    let kLeft=false, kRight=false, kJump=false, kShoot=false, kReload=false, kSwap=false;
    
    if(this.isBot) {
      let target = players.find(p => p.id !== this.id && p.hp > 0);
      if(target) {
        let dx = target.x - this.x, dy = target.y - this.y, dist = Math.hypot(dx, dy);
        this.aimAngle = Math.atan2(dy, dx);
        this.facingRight = Math.abs(this.aimAngle) < Math.PI/2;
        if(dist > 60) { kLeft = dx < -20; kRight = dx > 20; }
        if(isSolid(this.x + (this.facingRight?10:-10), this.y) && this.vy === 0) kJump = true;
        if(dist < 250 && this.fireCooldown <= 0 && Math.random() < 0.05) kShoot = true;
        if(this.ammo <= 0) kReload = true;
      }
    } else {
      const gp = getGamepadInput(this.id);
      if(this.id === 0 && activeGamepadIndices[0] === 'KBD') {
        kLeft=keys.ArrowLeft; kRight=keys.ArrowRight; kJump=keys.ArrowUp; kShoot=keys.Enter; kReload=keys.KeyR; kSwap=keys.KeyQ;
      }
      if(gp) {
        kJump=gpIs(gp,'SELECT'); kShoot=gpBtn(gp,7); kReload=gpIs(gp,'TRIANGLE'); kSwap=gpBtn(gp,4)||gpBtn(gp,6);
        let ax = gpAx(gp,0), ay = gpAx(gp,1);
        if(Math.abs(ax)>0.2) { if(ax<0)kLeft=true; else kRight=true; }
        let rx = gpAx(gp,2), ry = gpAx(gp,3);
        if(Math.abs(rx)>0.2 || Math.abs(ry)>0.2) {
          this.aimAngle = Math.atan2(ry, rx);
          this.facingRight = Math.abs(this.aimAngle) < Math.PI/2;
        }
      }
    }

    if(this.fireCooldown > 0) this.fireCooldown--;

    if(kSwap && this.fireCooldown <= 0 && this.reloadTimer <= 0) {
      this.weaponIndex = (this.weaponIndex + 1) % this.weapons.length;
      this.ammo = MAX_AMMO[this.weapons[this.weaponIndex]]; playSound('switch'); this.fireCooldown = 15;
    }

    this.isWalking = false;
    if(kLeft) { this.vx -= 0.6; this.isWalking = true; if(this.isBot || !gpIs(getGamepadInput(this.id),'RIGHT')) this.facingRight = false; }
    if(kRight){ this.vx += 0.6; this.isWalking = true; if(this.isBot || !gpIs(getGamepadInput(this.id),'RIGHT')) this.facingRight = true; }
    
    this.vx *= FRICTION; this.vy += GRAVITY;
    if(kJump && isSolid(this.x, this.y + 6)) this.vy = -4.5;

    if(!isSolid(this.x + this.vx, this.y)) this.x += this.vx; else this.vx = 0;
    if(!isSolid(this.x, this.y + this.vy)) this.y += this.vy; else { this.vy = 0; this.y = Math.floor(this.y); }
    
    let wep = this.weapons[this.weaponIndex];
    if(kReload && this.ammo < MAX_AMMO[wep] && this.reloadTimer <= 0) { this.reloadTimer = RELOAD_TIMES[wep]; playSound('reload'); }
    
    if(this.reloadTimer > 0) {
      this.reloadTimer--; if(this.reloadTimer <= 0) this.ammo = MAX_AMMO[wep];
    } else if(kShoot && this.fireCooldown <= 0 && this.ammo > 0) {
      this.ammo--; this.fireCooldown = [15, 3, 40, 20, 60, 20, 60, 40, 30, 2, 40, 10, 20, 60, 60, 0, 40, 40, 50, 30, 80][wep];
      let dirX = Math.cos(this.aimAngle), dirY = Math.sin(this.aimAngle);
      let spawnX = this.x + dirX*6, spawnY = this.y + dirY*6;
      
      if(wep === W_HANDGUN) { playSound('shoot_handgun'); bullets.push(new Bullet(spawnX, spawnY, dirX*8, dirY*8, this.id, wep)); this.vx -= dirX*1; }
      else if(wep === W_MINIGUN) { playSound('shoot_minigun'); let spread=(Math.random()-.5)*0.2; bullets.push(new Bullet(spawnX, spawnY, Math.cos(this.aimAngle+spread)*9, Math.sin(this.aimAngle+spread)*9, this.id, wep)); }
      else if(wep === W_SHOTGUN) { 
        playSound('shoot_shotgun'); 
        for(let i=0; i<8; i++) { let spread = (Math.random()-.5)*0.4; bullets.push(new Bullet(spawnX, spawnY, Math.cos(this.aimAngle+spread)*10, Math.sin(this.aimAngle+spread)*10, this.id, wep)); }
        this.vx -= dirX*3;
      }
      else if(wep === W_BAZOOKA) { playSound('explosion_puff'); bullets.push(new Bullet(spawnX, spawnY, dirX*6, dirY*6, this.id, wep)); this.vx -= dirX*3; }
      else if(wep === W_GRENADE || wep === W_DYNAMITE) { playSound('shoot_handgun'); grenades.push(new Grenade(spawnX, spawnY, dirX*7, dirY*7, this.id, wep)); }
      
      if(this.ammo <= 0) { this.reloadTimer = RELOAD_TIMES[wep]; playSound('reload'); }
    }
    
    if(this.isWalking) this.animTimer++; else this.animTimer = 0;
    this.x = clamp(this.x, 0, MAP_W-1); this.y = clamp(this.y, 0, MAP_H-1);
  }

  draw(c) {
    if(this.deathPhase !== 'alive') return;
    c.save(); 
    // FLICKER FIX
    c.translate(Math.floor(this.x), Math.floor(this.y));
    if(!this.facingRight) c.scale(-1, 1);
    
    let bounce = (this.isWalking && Math.floor(this.animTimer/5)%2===0) ? -1 : 0;
    if(this.vy !== 0) bounce = -1;
    
    c.save(); c.rotate(this.facingRight ? this.aimAngle : Math.PI - this.aimAngle);
    c.fillStyle = '#555'; c.fillRect(2, bounce-1, 8, 3); c.restore();

    let sprite = this.spriteStand;
    if(this.vy !== 0) sprite = this.spriteJump;
    else if(this.isWalking) sprite = (Math.floor(this.animTimer/5)%2===0) ? this.spriteWalk1 : this.spriteWalk2;
    
    c.drawImage(sprite, -4, -6 + bounce);
    c.restore();
    
    c.fillStyle = this.color; c.font = "10px 'VT323', monospace"; c.textAlign = 'center';
    c.fillText(PLAYER_NAMES[this.id], Math.floor(this.x), Math.floor(this.y) - 15);
    c.fillStyle = '#F00'; c.fillRect(Math.floor(this.x)-10, Math.floor(this.y)-12, 20, 2);
    c.fillStyle = '#0F0'; c.fillRect(Math.floor(this.x)-10, Math.floor(this.y)-12, Math.max(0, this.hp/100*20), 2);
    c.textAlign = 'left';
  }
}

// ─── MAIN LOOP ───
function initGame(genNew) {
  if(genNew) { if(gameMode==='ARENA') generateArenaTerrain(); else generateTerrain(); }
  players = []; bullets.length=0; grenades.length=0; particles.length=0; visualExplosions.length=0;
  
  for(let i=0; i < activeGamepadIndices.length; i++) {
    let isBot = activeGamepadIndices[i] === 'BOT';
    players.push(new Player(i, 100 + i*200, 50, PLAYER_COLORS[i], customizeSkins[i], isBot));
  }
  gameState = STATE_COUNTDOWN;
}

function updatePlaying() {
  if(keys.Escape || (getGamepadInput(0) && gpIs(getGamepadInput(0),'BACK'))) { gameState = STATE_MENU; playSound('click'); return; }
  
  players.forEach(p => p.update());
  for(let i=bullets.length-1; i>=0; i--) if(!bullets[i].update()) bullets.splice(i,1);
  for(let i=grenades.length-1; i>=0; i--) if(!grenades[i].update()) grenades.splice(i,1);
  for(let i=particles.length-1; i>=0; i--) if(!particles[i].update()) particles.splice(i,1);
  for(let i=visualExplosions.length-1; i>=0; i--) if(!visualExplosions[i].update()) visualExplosions.splice(i,1);

  let aliveTeams = players.filter(p => p.hp > 0 || p.lives > 0);
  if(aliveTeams.length <= 1 && players.length > 1) {
    matchWinnerId = aliveTeams.length === 1 ? aliveTeams[0].id : -1;
    gameState = STATE_VICTORY; victoryTimer = 300; playWinMusic();
  }
}

function drawPlaying() {
  ctx.fillStyle = '#3B83BD'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  
  let cx=0, cy=0, count=0;
  players.forEach(p => { if(p.deathPhase==='alive'){ cx+=p.x; cy+=p.y; count++; } });
  if(count>0){ cx/=count; cy/=count; } else { cx=MAP_W/2; cy=MAP_H/2; }
  let camX = clamp(cx - VIEW_W/2, 0, MAP_W - VIEW_W);
  let camY = clamp(cy - VIEW_H/2, 0, MAP_H - VIEW_H);

  if(screenShake > 0) { camX += (Math.random()-.5)*screenShake; camY += (Math.random()-.5)*screenShake; screenShake *= 0.8; if(screenShake<1) screenShake=0; }
  
  ctx.save(); ctx.scale(SCALE, SCALE); ctx.translate(Math.floor(-camX), Math.floor(-camY));
  drawBgNoise();
  ctx.drawImage(mapCanvas, 0, 0); ctx.drawImage(bloodCanvas, 0, 0);
  
  grenades.forEach(g => g.draw(ctx));
  players.forEach(p => p.draw(ctx));
  bullets.forEach(b => b.draw(ctx));
  particles.forEach(p => p.draw(ctx));
  visualExplosions.forEach(v => v.draw(ctx));
  
  ctx.restore();
  
  // HUD
  ctx.fillStyle = '#000'; ctx.fillRect(0, CANVAS_H - HUD_H, CANVAS_W, HUD_H);
  ctx.fillStyle = '#FFF'; ctx.font = "16px 'VT323', monospace";
  players.forEach((p, i) => {
    let px = 10 + i * (CANVAS_W/players.length);
    ctx.fillStyle = p.color; ctx.fillText(PLAYER_NAMES[p.id], px, CANVAS_H - 45);
    ctx.fillStyle = '#FFF'; ctx.fillText(`HP: ${Math.floor(p.hp)}  LIVES: ${p.lives}`, px, CANVAS_H - 25);
    let wep = p.weapons[p.weaponIndex];
    ctx.fillText(`${WEAPON_NAMES[wep][currentLang]}: ${p.reloadTimer>0?'RELOAD':p.ammo}`, px, CANVAS_H - 5);
  });
}

function gameLoop() {
  // Always poll gamepads
  if(navigator.getGamepads) navigator.getGamepads(); 

  if(gameState === STATE_MENU || gameState === STATE_OPTIONS || gameState === STATE_JOINING || gameState === STATE_WEAPON_LIST || gameState === STATE_LEVEL_PROMPT) {
    handleMenuInput();
    ctx.fillStyle = '#1a0f06'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#FFF'; ctx.font = "30px 'VT323', monospace"; ctx.textAlign = 'center';
    ctx.fillText(t('WEBLIERO'), CANVAS_W/2, 50);
    ctx.font = "20px 'VT323', monospace";
    
    if(gameState === STATE_MENU) {
      mainMenuOptions.forEach((opt, i) => {
        ctx.fillStyle = i === mainMenuSel ? '#0F0' : '#FFF';
        ctx.fillText(i === mainMenuSel ? `> ${t(opt)} <` : t(opt), CANVAS_W/2, 100 + i*30);
      });
    } else if(gameState === STATE_OPTIONS) {
      gfxMenuOptions.forEach((opt, i) => {
        ctx.fillStyle = i === optionsMenuSel ? '#0F0' : '#FFF';
        ctx.fillText(i === optionsMenuSel ? `> ${t(opt)} <` : t(opt), CANVAS_W/2, 100 + i*30);
      });
    } else if(gameState === STATE_LEVEL_PROMPT) {
      ctx.fillText("Press X to Generate Random Level", CANVAS_W/2, 120);
    } else if(gameState === STATE_JOINING) {
      ctx.fillText("Press X on Controller to Join!", CANVAS_W/2, 120);
      ctx.fillText(`Joined: ${joinedPlayers.size} / ${is4PlayerMode?4:2}`, CANVAS_W/2, 160);
    }
    ctx.textAlign = 'left';
  } 
  else if (gameState === STATE_WEAPON_SELECT) {
    handleMenuInput();
    ctx.fillStyle = '#1a0f06'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#FFF'; ctx.font = "20px 'VT323', monospace"; ctx.textAlign = 'center';
    ctx.fillText("WEAPON READY CHECK", CANVAS_W/2, 50);
    ctx.font = "16px 'VT323', monospace";
    for(let i=0; i<(is4PlayerMode?4:2); i++) {
      ctx.fillStyle = wsReady[i] ? '#0F0' : '#F00';
      ctx.fillText(`Player ${i+1}: ${wsReady[i] ? 'READY' : 'PRESS X'}`, CANVAS_W/2, 100 + i*30);
    }
    ctx.textAlign = 'left';
  }
  else if (gameState === STATE_PLAYING) { updatePlaying(); drawPlaying(); }
  else if (gameState === STATE_COUNTDOWN) { 
    drawPlaying(); 
    countdownTimer--; 
    if(countdownTimer<=0){
      countdownValue--; countdownTimer=60;
      if(countdownValue<0) gameState=STATE_PLAYING;
    }
    if(countdownValue>=0) {
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.fillStyle='#FFF'; ctx.font="50px 'VT323', monospace"; ctx.textAlign='center';
      ctx.fillText(countdownValue>0?countdownValue:"GO!", CANVAS_W/2, CANVAS_H/2);
      ctx.textAlign='left';
    }
  }
  else if (gameState === STATE_VICTORY) {
    drawPlaying();
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#FFD700'; ctx.font = "40px 'VT323', monospace"; ctx.textAlign = 'center';
    let text = matchWinnerId >= 0 ? `${PLAYER_NAMES[matchWinnerId]} ${t('WINS_MATCH')}` : "DRAW!";
    ctx.fillText(text, CANVAS_W/2, CANVAS_H/2);
    ctx.font = "20px 'VT323', monospace"; ctx.fillStyle = '#FFF';
    ctx.fillText("Press X to return", CANVAS_W/2, CANVAS_H/2 + 40);
    ctx.textAlign = 'left';
    victoryTimer--;
    if(victoryTimer <= 0 || keys.Enter || (getGamepadInput(0)&&gpIs(getGamepadInput(0),'SELECT'))) {
      gameState = STATE_MENU; startMenuMusic(); lastInputTime = Date.now() + 200;
    }
  }
  
  if(fadeAlpha > 0) { ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); }
  requestAnimationFrame(gameLoop);
}

startMenuMusic();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
